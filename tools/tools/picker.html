<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Picker - Tone.pics</title>

<link rel="stylesheet" href="tool-style.css">

</head>


<body>


<div class="tool-container">


<a class="back-home" href="../index.html">
← Back Home
</a>


<div class="tool-header">

<h1>🎯 Color Picker</h1>

<p>
Pick any color from your image instantly.
</p>

</div>



<div class="tool-box">


<input 
type="file" 
id="imageInput" 
accept="image/*"
>


<canvas id="canvas"></canvas>


<div id="result">

<h3>Selected Color</h3>

<div id="colorBox"></div>

<p id="hex">HEX: -</p>

<p id="rgb">RGB: -</p>

<button class="button" id="copyBtn">
Copy HEX
</button>

</div>


</div>



</div>



<footer>

© 2026 Tone.pics

</footer>




<script>


const input = document.getElementById("imageInput");

const canvas = document.getElementById("canvas");

const ctx = canvas.getContext("2d");

const hexText = document.getElementById("hex");

const rgbText = document.getElementById("rgb");

const colorBox = document.getElementById("colorBox");

const copyBtn = document.getElementById("copyBtn");


let currentHex = "";



canvas.style.maxWidth = "100%";

canvas.style.borderRadius = "15px";

canvas.style.cursor = "crosshair";



input.addEventListener("change", function(){


const file = this.files[0];


if(!file) return;



const img = new Image();


img.onload = function(){


canvas.width = img.width;

canvas.height = img.height;


ctx.drawImage(
img,
0,
0
);


};



img.src = URL.createObjectURL(file);



});



canvas.addEventListener("click", function(event){


const rect = canvas.getBoundingClientRect();


const x = Math.floor(
(event.clientX - rect.left)
*
(canvas.width / rect.width)
);


const y = Math.floor(
(event.clientY - rect.top)
*
(canvas.height / rect.height)
);



const pixel = ctx.getImageData(
x,
y,
1,
1
).data;



const r = pixel[0];

const g = pixel[1];

const b = pixel[2];



currentHex =
"#" +
[r,g,b].map(value=>{


let h = value.toString(16);


return h.length === 1 
? "0"+h 
: h;


}).join("");



hexText.textContent =
"HEX: " + currentHex.toUpperCase();



rgbText.textContent =
`RGB: ${r}, ${g}, ${b}`;



colorBox.style.background = currentHex;



});



copyBtn.addEventListener("click", function(){


if(currentHex){

navigator.clipboard.writeText(currentHex);


alert(
"Copied " + currentHex.toUpperCase()
);


}


});



</script>



<style>

#canvas{

display:block;

margin:25px auto;

}


#colorBox{

width:120px;

height:120px;

border-radius:20px;

margin:20px auto;

background:#334155;

}



#result{

margin-top:30px;

}



</style>



</body>

</html>
