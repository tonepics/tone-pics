<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>AI Background Remover | Tone.pics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #000000;
            --ink-2: #0b0c0e;
            --panel: #111215;
            --panel-2: #17191d;
            --line: #22262a;
            --line-soft: #1a1d22;
            --text: #eceeef;
            --text-dim: #8d969d;
            --text-faint: #5c6469;
            --accent: #43e5c5;
            --accent-dim: #2b7a6c;
            --radius: 14px;
            --radius-sm: 9px;
        }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(1200px 700px at 15% -10%, #16233040 0%, transparent 60%), var(--ink);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0; min-height: 100vh; padding: 20px;
        }
        .app { max-width: 1200px; margin: 0 auto; }
        
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--line-soft); padding-bottom: 15px; margin-bottom: 30px;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-mark {
            width: 42px; height: 42px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
            display: grid; place-items: center;
        }
        .brand h1 { font-size: 1.15rem; font-weight: 900; margin: 0; }
        .brand p { margin: 1px 0 0; font-size: .78rem; color: var(--text-dim); font-family: 'JetBrains Mono'; }

        .workspace { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 768px) { .workspace { grid-template-columns: 1fr 1fr; } }

        .card { background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--radius); padding: 24px; position: relative; }
        .subhead { font-size: .72rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: .06em; margin: 0 0 15px; font-family: 'JetBrains Mono'; }

        .dropzone {
            border: 2px dashed var(--line); border-radius: var(--radius); padding: 60px 20px;
            text-align: center; cursor: pointer; transition: .15s; background: var(--ink-2);
        }
        .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: #43e5c508; }
        .dropzone svg { width: 44px; height: 44px; color: var(--text-faint); margin-bottom: 12px; }
        .dropzone p { margin: 0; font-size: .9rem; color: var(--text-dim); }
        .dropzone span { color: var(--accent); font-weight: 700; }

        .preview-box {
            width: 100%; aspect-ratio: 4/3; background: var(--ink-2); border: 1px solid var(--line);
            border-radius: var(--radius-sm); display: grid; place-items: center; overflow: hidden; position: relative;
        }
        .transparent-bg {
            background-color: #1a1d22;
            background-image: linear-gradient(45deg, #111215 25%, transparent 25%), linear-gradient(-45deg, #111215 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111215 75%), linear-gradient(-45deg, transparent 75%, #111215 75%);
            background-size: 16px 16px;
        }
        .preview-box img, .preview-box canvas { max-width: 100%; max-height: 100%; object-fit: contain; z-index: 2; }

        .loader {
            position: absolute; inset: 0; background: rgba(17, 18, 21, 0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 10; border-radius: var(--radius);
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--line); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p { margin: 0; font-size: .85rem; color: var(--accent); font-weight: 600; font-family: 'JetBrains Mono'; }

        .btn {
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--accent); color: #06120f; font-weight: 700; padding: 14px;
            border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: .9rem; transition: .15s; margin-top: 15px;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn:disabled { background: var(--line); color: var(--text-faint); cursor: not-allowed; }
    </style>
</head>
<body>

<div class="app">
    <div class="topbar">
        <div class="brand">
            <div class="brand-mark">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#06120f" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            <div>
                <h1>AI Background Remover</h1>
                <p>Google MediaPipe AI · Smart Isolation · 100% Local</p>
            </div>
        </div>
    </div>

    <div class="workspace">
        <div class="card">
            <p class="subhead">Source Image</p>
            <div class="dropzone" id="dropzone">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <p>Drag & Drop original photo or <span>Browse</span></p>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            
            <div class="preview-box" id="origBox" style="display:none;">
                <img id="origImg" src="">
            </div>
            <button class="btn" id="btnProcess" disabled>Remove Background with AI</button>
        </div>

        <div class="card">
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p id="loaderText">Initializing AI Engine...</p>
            </div>
            
            <p class="subhead">AI Smart Preview</p>
            <div class="preview-box transparent-bg">
                <span id="resultPlaceholder" style="color:var(--text-faint); font-size:.85rem;">Isolated AI layer will render here</span>
                <canvas id="resultCanvas" style="display:none;"></canvas>
            </div>
            <button class="btn" id="btnDownload" disabled style="background: transparent; border: 1px solid var(--line); color: var(--text);">Download Transparent PNG</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

<script>
    const $ = sel => document.querySelector(sel);
    let selfieSegmentation = null;
    let inputImage = null;

    // تهيئة محرك الذكاء الاصطناعي فور فتح الصفحة
    function initAI() {
        selfieSegmentation = new SelfieSegmentation({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
        });

        selfieSegmentation.setOptions({
            modelSelection: 1, // استخدام الموديل العام والأدق للأجسام والأشخاص
        });

        selfieSegmentation.onResults(onAiResults);
    }

    $('#dropzone').addEventListener('click', () => $('#fileInput').click());
    $('#fileInput').addEventListener('change', (e) => {
        if(e.target.files.length) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            $('#origImg').src = event.target.result;
            $('#dropzone').style.display = 'none';
            $('#origBox').style.display = 'grid';
            
            inputImage = new Image();
            inputImage.src = event.target.result;
            inputImage.onload = () => {
                $('#btnProcess').disabled = false;
            };
        };
        reader.readAsDataURL(file);
    }

    $('#btnProcess').addEventListener('click', async () => {
        if (!inputImage) return;
        $('#loader').style.display = 'flex';
        $('#loaderText').textContent = "AI Segmenting Objects...";
        
        // إرسال الصورة للموديل لمعالجتها عصبياً وفصلها
        await selfieSegmentation.send({ image: inputImage });
    });

    // دالة استقبال النتائج من الـ AI ورسم الماسك الشفاف بدقة عالية
    function onAiResults(results) {
        const canvas = $('#resultCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = inputImage.width;
        canvas.height = inputImage.height;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. رسم قناع عزل الخلفية الشفاف
        ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
        
        // 2. دمج الصورة الأصلية فوق القناع باستخدام بكسلات التقاطع فقط (تفريغ حقيقي)
        ctx.globalCompositeOperation = 'source-in';
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        
        // إعادة نمط الرسم للوضع الطبيعي
        ctx.globalCompositeOperation = 'source-over';
        
        $('#loader').style.display = 'none';
        canvas.style.display = 'block';
        $('#resultPlaceholder').style.display = 'none';
        $('#btnDownload').disabled = false;
    }

    $('#btnDownload').addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = $('#resultCanvas').toDataURL('image/png');
        a.download = `tone-pics-ai-remover-${Date.now()}.png`;
        a.click();
    });

    // بدء تشغيل الموديل
    initAI();
</script>

</body>
</html>
