<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter - Tone.pics</title>
    <link rel="stylesheet" href="tool-style.css">

    <script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>

    <div class="tool-container">
        <a class="back-home" href="../index.html">← Back Home</a>

        <div class="tool-header">
            <h1>🔄 Image Converter</h1>
            <p>Convert images and PDF files online securely.</p>
        </div>

        <div class="tool-box">
            <div class="drop-zone" id="dropZone" style="cursor: pointer;">
                <p>📁 Drag & Drop files here<br>or click to select</p>
                <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.webp,.heic,.heif,.avif,.pdf" style="display: none;">
            </div>

            <br>
            <div id="fileList"></div>
            <br>

            <label>Convert To:</label>
            <select id="format">
                <option value="jpeg">JPG</option>
                <option value="png">PNG</option>
                <option value="webp">WebP</option>
            </select>

            <br><br>

            <label>Quality:</label>
            <input type="range" id="quality" min="10" max="100" value="90">
            <span id="qualityValue">90%</span>

            <br><br>

            <img id="preview" class="preview-image" style="max-width: 100%; max-height: 200px; display: none; margin: 10px auto; border-radius: 8px;">
            <p id="info">Choose files to start.</p>

            <button class="button" id="convertBtn">Convert All</button>
            <button class="button" id="downloadZipBtn" style="display: none; background-color: #28a745; margin-top: 10px;">Download All (ZIP) 📦</button>

            <br><br>
            <div id="results"></div>
        </div>
    </div>

    <footer>
        © 2026 Tone.pics
    </footer>

    <script>
        // فحص آمن لتهيئة الـ Worker الخاص بمكتبة PDF منعاً لانهيار الاسكربت إذا تأخر الـ CDN
        function initPdfWorker() {
            if (window['pdfjsLib']) {
                window['pdfjsLib'].GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                return true;
            }
            return false;
        }
        initPdfWorker();

        const fileInput = document.getElementById("fileInput");
        const dropZone = document.getElementById("dropZone");
        const fileList = document.getElementById("fileList");
        const format = document.getElementById("format");
        const quality = document.getElementById("quality");
        const qualityValue = document.getElementById("qualityValue");
        const preview = document.getElementById("preview");
        const info = document.getElementById("info");
        const convertBtn = document.getElementById("convertBtn");
        const downloadZipBtn = document.getElementById("downloadZipBtn");
        const results = document.getElementById("results");

        let selectedFiles = [];
        let convertedBlobs = [];
        let currentPreviewUrl = null;
        let activeDownloadUrls = []; 
        let isConverting = false;    

        const ALLOWED_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.webp', '.heic', '.heif', '.avif', '.pdf'];

        quality.addEventListener("input", () => {
            qualityValue.textContent = quality.value + "%";
        });

        fileInput.addEventListener("change", () => {
            handleFileSelection(fileInput.files);
            fileInput.value = "";
        });

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("active");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("active");
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("active");
            handleFileSelection(e.dataTransfer.files);
        });

        dropZone.addEventListener("click", () => {
            fileInput.click();
        });

        function handleFileSelection(files) {
            const rawFiles = Array.from(files);
            selectedFiles = rawFiles.filter(file => {
                const lastDot = file.name.lastIndexOf('.');
                if (lastDot === -1) return false; 
                const ext = file.name.substring(lastDot).toLowerCase();
                return ALLOWED_EXTENSIONS.includes(ext);
            });

            if (selectedFiles.length < rawFiles.length) {
                alert("Some files were blocked because they are not supported images or PDFs.");
            }

            clearPreviousResults();
            showFiles();
        }

        function showFiles() {
            fileList.innerHTML = "";

            if (currentPreviewUrl) {
                URL.revokeObjectURL(currentPreviewUrl);
                currentPreviewUrl = null;
            }
            preview.style.display = "none";
            preview.removeAttribute("src");

            if (selectedFiles.length === 0) {
                info.textContent = "Choose files to start.";
                return;
            }

            selectedFiles.forEach((file, index) => {
                const item = document.createElement("p");
                item.textContent = (index + 1) + ". " + file.name + " (" + formatSize(file.size) + ")";
                fileList.appendChild(item);
            });
            info.textContent = selectedFiles.length + " file(s) ready";

            const file = selectedFiles[0];
            const lastDot = file.name.lastIndexOf('.');
            const ext = lastDot !== -1 ? file.name.substring(lastDot).toLowerCase() : '';

            if (ext === '.heic' || ext === '.heif') {
                info.textContent += " (Preview not available for HEIC until converted)";
            } else if (ext === '.pdf' || file.type === 'application/pdf') {
                info.textContent += " (PDF pages will be rendered on conversion)";
            } else if (file.type.startsWith("image/") || ['.jpg', '.jpeg', '.png', '.webp', '.avif'].includes(ext)) {
                preview.style.display = "block";
                currentPreviewUrl = URL.createObjectURL(file);
                preview.src = currentPreviewUrl;
            }
        }

        function clearPreviousResults() {
            activeDownloadUrls.forEach(url => URL.revokeObjectURL(url));
            activeDownloadUrls = [];
            convertedBlobs = [];
            results.innerHTML = "";
            downloadZipBtn.style.display = "none";
        }

        convertBtn.addEventListener("click", async () => {
            if (isConverting) return; 

            if (selectedFiles.length === 0) {
                alert("Choose files first");
                return;
            }

            isConverting = true;
            convertBtn.disabled = true;
            convertBtn.textContent = "Converting...";

            clearPreviousResults();
            let failedCount = 0;

            try {
                for (const file of selectedFiles) {
                    try {
                        const lastDot = file.name.lastIndexOf('.');
                        const ext = lastDot !== -1 ? file.name.substring(lastDot).toLowerCase() : '';
                        info.textContent = "Converting: " + file.name;

                        if (ext === ".heic" || ext === ".heif") {
                            await convertHEIC(file);
                        } else if (file.type === "application/pdf" || ext === ".pdf") {
                            await convertPDF(file);
                        } else if (ext === ".avif") {
                            await convertAVIF(file);
                        } else {
                            await convertImage(file);
                        }
                    } catch (error) {
                        console.error(error);
                        failedCount++;
                        showResult(file.name, `Failed: ${error.message || "Error"} ❌`);
                    }
                }

                if (failedCount === selectedFiles.length) {
                    info.textContent = "Conversions failed ❌";
                } else {
                    info.textContent = failedCount > 0 ? `Finished with ${failedCount} error(s) ⚠️` : "All conversions finished ✔";
                    if (convertedBlobs.length > 1) {
                        downloadZipBtn.style.display = "inline-block";
                    }
                }
            } finally {
                // الـ finally تضمن تحرير زر الواجهة حتى لو حدث استثناء خارق أو انهيار غير متوقع
                isConverting = false;
                convertBtn.disabled = false;
                convertBtn.textContent = "Convert All";
            }
        });

        downloadZipBtn.addEventListener("click", () => {
            if (convertedBlobs.length === 0) return;

            downloadZipBtn.disabled = true;
            const zip = new JSZip();
            
            // حل مشكلة تكرار نفس اسم الملف المرفوع لمنع الـ Overwrite داخل الـ ZIP
            const usedNames = {};
            convertedBlobs.forEach(item => {
                let nameToUse = item.name;
                if (usedNames[nameToUse] !== undefined) {
                    usedNames[nameToUse]++;
                    const lastDot = nameToUse.lastIndexOf('.');
                    const base = lastDot !== -1 ? nameToUse.substring(0, lastDot) : nameToUse;
                    const ext = lastDot !== -1 ? nameToUse.substring(lastDot) : '';
                    nameToUse = `${base}_(${usedNames[nameToUse]})${ext}`;
                } else {
                    usedNames[nameToUse] = 0;
                }
                zip.file(nameToUse, item.blob);
            });

            info.textContent = "Generating ZIP file... ⏳";
            zip.generateAsync({ type: "blob" }).then((content) => {
                const link = document.createElement("a");
                const zipUrl = URL.createObjectURL(content);
                link.href = zipUrl;
                link.download = "converted_files_tone_pics.zip";
                document.body.appendChild(link);
                link.click();
                link.remove();

                setTimeout(() => {
                    URL.revokeObjectURL(zipUrl);
                    // تحرير مصفوفة الـ Blobs من الذاكرة تماماً فور تنزيل الـ ZIP لحفظ الـ RAM
                    convertedBlobs = [];
                }, 60000);

                info.textContent = "ZIP downloaded successfully! ✔";
                downloadZipBtn.disabled = false;
            }).catch((error) => {
                console.error(error);
                info.textContent = "Failed to generate ZIP ❌";
                downloadZipBtn.disabled = false;
            });
        });

        function getBaseName(fileName) {
            const lastDot = fileName.lastIndexOf('.');
            return lastDot !== -1 ? fileName.substring(0, lastDot) : fileName;
        }

        function getTargetFormat() {
            if (format.value === "webp") return { mimeType: "image/webp", extension: "webp" };
            if (format.value === "png") return { mimeType: "image/png", extension: "png" };
            return { mimeType: "image/jpeg", extension: "jpg" };
        }

        function setupCanvas(imgWidth, imgHeight, targetMime) {
            const canvas = document.createElement("canvas");
            canvas.width = imgWidth;
            canvas.height = imgHeight;
            const ctx = canvas.getContext("2d");
            
            // تحصين شامل لخلفية مسار الشفافية عند التحويل لـ JPG عبر كل الدوال
            if (targetMime === "image/jpeg") {
                ctx.fillStyle = "#FFFFFF"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            return { canvas, ctx };
        }

        function convertImage(file) {
            return new Promise((resolve, reject) => {
                const objectUrl = URL.createObjectURL(file);
                const img = new Image();

                img.onload = function () {
                    try {
                        const { mimeType, extension } = getTargetFormat();
                        const { canvas, ctx } = setupCanvas(img.naturalWidth, img.naturalHeight, mimeType);
                        
                        ctx.drawImage(img, 0, 0);

                        canvas.toBlob((blob) => {
                            URL.revokeObjectURL(objectUrl);
                            // تدمير الـ canvas فوراً لتحرير الـ RAM
                            canvas.width = canvas.height = 0;
                            
                            if (!blob) { reject(new Error("Blob generation failed")); return; }
                            const outputName = getBaseName(file.name) + "." + extension;
                            createDownload(blob, outputName);
                            convertedBlobs.push({ blob, name: outputName });
                            resolve();
                        }, mimeType, Number(quality.value) / 100);
                    } catch (err) {
                        URL.revokeObjectURL(objectUrl);
                        reject(err);
                    }
                };
                img.onerror = () => {
                    URL.revokeObjectURL(objectUrl);
                    reject(new Error("Corrupted image or unsupported format"));
                };
                img.src = objectUrl;
            });
        }

        async function convertHEIC(file) {
            if (typeof heic2any === "undefined") {
                throw new Error("HEIC library not loaded from CDN yet.");
            }

            const { mimeType: finalMime, extension: finalExt } = getTargetFormat();
            
            // مكتبة heic2any ترجع دائماً إما jpeg أو png بشكل حقيقي.
            const heicTargetMime = finalMime === "image/webp" ? "image/jpeg" : finalMime;

            const result = await heic2any({
                blob: file,
                toType: heicTargetMime,
                quality: Number(quality.value) / 100
            });

            let rawBlob = Array.isArray(result) ? result[0] : result;
            
            // تمرير إجباري عبر تابع blobToFormat لمعالجة ثبات الصيغة، جودة الـ Canvas، وحظر الشفافية السوداء
            const finalBlob = await blobToFormat(rawBlob, finalMime, Number(quality.value) / 100);

            const outputName = getBaseName(file.name) + "." + finalExt;
            createDownload(finalBlob, outputName);
            convertedBlobs.push({ blob: finalBlob, name: outputName });
        }

        function blobToFormat(blob, mimeType, qualityValue) {
            return new Promise((resolve, reject) => {
                const objectUrl = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = function () {
                    const { canvas, ctx } = setupCanvas(img.naturalWidth, img.naturalHeight, mimeType);
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob((outBlob) => {
                        URL.revokeObjectURL(objectUrl);
                        canvas.width = canvas.height = 0; // تنظيف الذاكرة فوراً
                        if (!outBlob) { reject(new Error("Re-encoding failed")); return; }
                        resolve(outBlob);
                    }, mimeType, qualityValue);
                };
                img.onerror = () => {
                    URL.revokeObjectURL(objectUrl);
                    reject(new Error("Re-encoding failed"));
                };
                img.src = objectUrl;
            });
        }

        async function convertAVIF(file) {
            return new Promise((resolve, reject) => {
                const objectUrl = URL.createObjectURL(file);
                const img = new Image();

                img.onload = function () {
                    try {
                        const { mimeType, extension } = getTargetFormat();
                        const { canvas, ctx } = setupCanvas(img.naturalWidth, img.naturalHeight, mimeType);
                        
                        ctx.drawImage(img, 0, 0);

                        canvas.toBlob((blob) => {
                            URL.revokeObjectURL(objectUrl);
                            canvas.width = canvas.height = 0;
                            if (!blob) { reject(new Error("AVIF conversion failed")); return; }
                            const outputName = getBaseName(file.name) + "." + extension;
                            createDownload(blob, outputName);
                            convertedBlobs.push({ blob, name: outputName });
                            resolve();
                        }, mimeType, Number(quality.value) / 100);
                    } catch (err) {
                        URL.revokeObjectURL(objectUrl);
                        reject(err);
                    }
                };
                img.onerror = () => {
                    URL.revokeObjectURL(objectUrl);
                    reject(new Error("AVIF encoding not supported natively by this device/browser."));
                };
                img.src = objectUrl;
            });
        }

        async function convertPDF(file) {
            if (!window['pdfjsLib'] && !initPdfWorker()) {
                throw new Error("PDF.js library is missing or hasn't finished loading.");
            }

            try {
                const buffer = await file.arrayBuffer();
                const pdf = await window['pdfjsLib'].getDocument({ data: buffer }).promise;
                const { mimeType, extension } = getTargetFormat();

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 }); 

                    const { canvas, ctx } = setupCanvas(viewport.width, viewport.height, mimeType);
                    const renderContext = { canvasContext: ctx, viewport: viewport };
                    const renderTask = page.render(renderContext);

                    try {
                        await renderTask.promise;
                    } catch (renderErr) {
                        renderTask.cancel();
                        canvas.width = canvas.height = 0;
                        throw renderErr;
                    }

                    await new Promise((resolve, reject) => {
                        canvas.toBlob((blob) => {
                            // إجبار المتصفح على تفريغ مساحة الـ Canvas من كارت الشاشة والـ RAM فوراً بعد استخراج الـ Blob
                            canvas.width = canvas.height = 0; 
                            
                            if (!blob) { reject(new Error(`PDF page ${i} failed`)); return; }
                            const outputName = getBaseName(file.name) + `_page_${i}.` + extension;
                            createDownload(blob, outputName);
                            convertedBlobs.push({ blob, name: outputName });
                            resolve();
                        }, mimeType, Number(quality.value) / 100);
                    });

                    page.cleanup();
                }
            } catch (error) {
                console.error(error);
                throw new Error(error.message || "Failed to parse PDF file.");
            }
        }

        function createDownload(blob, fileName) {
            const url = URL.createObjectURL(blob);
            activeDownloadUrls.push(url); 

            const item = document.createElement("div");
            item.style.margin = "15px 0";

            const text = document.createElement("p");
            text.textContent = fileName;

            const button = document.createElement("button");
            button.className = "button";
            button.textContent = "Download";

            button.onclick = function () {
                const link = document.createElement("a");
                link.href = url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                link.remove();
                
                // تنظيف الذاكرة تلقائياً بعد دقيقتين لضمان انتهاء المعالجة في الخلفية تماماً
                setTimeout(() => {
                    const index = activeDownloadUrls.indexOf(url);
                    if (index > -1) {
                        URL.revokeObjectURL(url);
                        activeDownloadUrls.splice(index, 1);
                    }
                }, 120000);
            };

            item.appendChild(text);
            item.appendChild(button);
            results.appendChild(item);
        }

        function showResult(name, status) {
            const item = document.createElement("p");
            item.textContent = name + " : " + status;
            results.appendChild(item);
        }

        function formatSize(bytes) {
            if (bytes < 1024) { return bytes + " Bytes"; }
            if (bytes < 1024 * 1024) { return (bytes / 1024).toFixed(2) + " KB"; }
            return (bytes / (1024 * 1024)).toFixed(2) + " MB";
        }
    </script>
</body>
</html>
