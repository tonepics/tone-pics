<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter | Bloia.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --bg-main: #0f0f11;
            --bg-card: #18181c;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #2d2d34;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Style */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .btn-home:hover {
            color: var(--text-main);
        }

        /* Hero Header */
        .hero-section {
            text-align: center;
            padding: 25px 20px 10px 20px;
        }

        .hero-section h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #fff;
        }

        .hero-section p {
            color: var(--text-muted);
            font-size: 0.85rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Workspace Main Grid */
        .container {
            max-width: 650px;
            width: 100%;
            margin: 10px auto;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .tool-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Drop Zone Area Style */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 6px;
            padding: 30px 20px;
            text-align: center;
            background-color: #0f0f11;
            cursor: pointer;
            transition: all 0.2s;
        }

        .drop-zone:hover, .drop-zone.active {
            border-color: var(--accent);
            background-color: rgba(59, 130, 246, 0.03);
        }

        .drop-zone p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        #fileList {
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            background: #0f0f11;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        #fileList p {
            margin-bottom: 4px;
            word-break: break-all;
        }

        /* Form Row Inputs Style */
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            width: 100%;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-main);
            font-weight: 600;
        }

        select {
            background-color: #0f0f11;
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            min-width: 120px;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 65%;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            background: #2d2d34;
            height: 5px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        #qualityValue {
            font-size: 0.8rem;
            font-family: monospace;
            min-width: 35px;
            text-align: right;
        }

        #info {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            background: #0f0f11;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        /* Action Buttons */
        .btn {
            background-color: var(--accent);
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.2s;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-success {
            background-color: var(--success);
            border-color: var(--success);
        }

        .btn-success:hover {
            background-color: var(--success-hover);
            border-color: var(--success-hover);
        }

        /* Individual Outputs Layout Container */
        #results {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f0f11;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            gap: 10px;
        }

        .result-item p {
            font-size: 0.8rem;
            color: var(--text-muted);
            word-break: break-all;
            text-align: left;
            flex: 1;
        }

        .btn-download-single {
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-download-single:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn-download-single:disabled {
            background: #2d2d34;
            border-color: #2d2d34;
            color: var(--text-muted);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="btn-home">
            <span>←</span> Back Home
        </a>
        <div class="logo" style="font-weight: bold; font-size: 1rem; color: #fff;">🔄 Converter</div>
    </header>

    <section class="hero-section">
        <h1>🔄 Image Converter</h1>
        <p>Convert images and PDF files online securely right inside your browser architecture.</p>
    </section>

    <main class="container">
        
        <div class="tool-box">
            <div class="drop-zone" id="dropZone">
                <p>📁 Drag & Drop files here<br>or click to select</p>
                <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.webp,.heic,.heif,.avif,.pdf" style="display: none;">
            </div>

            <div id="fileList">No files selected yet.</div>

            <div class="control-row">
                <label for="format">Convert To:</label>
                <select id="format">
                    <option value="jpeg">JPG</option>
                    <option value="png">PNG</option>
                    <option value="webp">WebP</option>
                </select>
            </div>

            <div class="control-row">
                <label for="quality">Quality:</label>
                <div class="slider-wrapper">
                    <input type="range" id="quality" min="10" max="100" value="90">
                    <span id="qualityValue">90%</span>
                </div>
            </div>

            <img id="preview" alt="Converter Structural Layout Preview Asset">
            
            <div id="info">Choose files to start.</div>

            <button class="btn" id="convertBtn">Convert All</button>
            <button class="btn btn-success" id="downloadZipBtn" style="display: none;">Download All (ZIP) 📦</button>

            <div id="results"></div>
        </div>

    </main>

    <script>
        function initPdfWorker() {
            if (window['pdfjsLib']) {
                window['pdfjsLib'].GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                return true;
            }
            return false;
        }
        initPdfWorker();

        const fileInput = document.getElementById("fileInput");
        const dropZone = document.getElementById("dropZone");
        const fileList = document.getElementById("fileList");
        const format = document.getElementById("format");
        const quality = document.getElementById("quality");
        const qualityValue = document.getElementById("qualityValue");
        const preview = document.getElementById("preview");
        const info = document.getElementById("info");
        const convertBtn = document.getElementById("convertBtn");
        const downloadZipBtn = document.getElementById("downloadZipBtn");
        const results = document.getElementById("results");

        let selectedFiles = [];
        let convertedBlobs = [];
        let currentPreviewUrl = null;
        let isConverting = false;

        let activeDownloads = [];
        let currentZipUrl = null;
        let zipCleanupTimerId = null;

        const ALLOWED_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.webp', '.heic', '.heif', '.avif', '.pdf'];

        quality.addEventListener("input", () => {
            qualityValue.textContent = quality.value + "%";
        });

        fileInput.addEventListener("change", () => {
            handleFileSelection(fileInput.files);
            fileInput.value = "";
        });

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("active");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("active");
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("active");
            handleFileSelection(e.dataTransfer.files);
        });

        dropZone.addEventListener("click", () => {
            fileInput.click();
        });

        function handleFileSelection(files) {
            const rawFiles = Array.from(files);
            selectedFiles = rawFiles.filter(file => {
                const lastDot = file.name.lastIndexOf('.');
                if (lastDot === -1) return false;
                const ext = file.name.substring(lastDot).toLowerCase();
                return ALLOWED_EXTENSIONS.includes(ext);
            });

            if (selectedFiles.length < rawFiles.length) {
                alert("Some files were blocked because they are not supported images or PDFs.");
            }

            clearPreviousResults();
            showFiles();
        }

        function showFiles() {
            fileList.innerHTML = "";

            if (currentPreviewUrl) {
                URL.revokeObjectURL(currentPreviewUrl);
                currentPreviewUrl = null;
            }
            preview.style.display = "none";
            preview.removeAttribute("src");

            if (selectedFiles.length === 0) {
                fileList.textContent = "No files selected yet.";
                info.textContent = "Choose files to start.";
                return;
            }

            selectedFiles.forEach((file, index) => {
                const item = document.createElement("p");
                item.textContent = (index + 1) + ". " + file.name + " (" + formatSize(file.size) + ")";
                fileList.appendChild(item);
            });
            info.textContent = selectedFiles.length + " file(s) ready";

            const file = selectedFiles[0];
            const lastDot = file.name.lastIndexOf('.');
            const ext = lastDot !== -1 ? file.name.substring(lastDot).toLowerCase() : '';

            if (ext === '.heic' || ext === '.heif') {
                info.textContent += " (Preview not available for HEIC until converted)";
            } else if (ext === '.pdf' || file.type === 'application/pdf') {
                info.textContent += " (PDF pages will be rendered on conversion)";
            } else if (file.type.startsWith("image/") || ['.jpg', '.jpeg', '.png', '.webp', '.avif'].includes(ext)) {
                preview.style.display = "block";
                currentPreviewUrl = URL.createObjectURL(file);
                preview.src = currentPreviewUrl;
            }
        }

        function clearPreviousResults() {
            activeDownloads.forEach(entry => {
                if (entry.timerId !== null) clearTimeout(entry.timerId);
                URL.revokeObjectURL(entry.url);
            });
            activeDownloads = [];

            if (zipCleanupTimerId !== null) {
                clearTimeout(zipCleanupTimerId);
                zipCleanupTimerId = null;
            }
            if (currentZipUrl !== null) {
                URL.revokeObjectURL(currentZipUrl);
                currentZipUrl = null;
            }

            convertedBlobs = [];
            results.innerHTML = "";
            downloadZipBtn.style.display = "none";
            downloadZipBtn.disabled = false;
        }

        convertBtn.addEventListener("click", async () => {
            if (isConverting) return;

            if (selectedFiles.length === 0) {
                alert("Choose files first");
                return;
            }

            isConverting = true;
            convertBtn.disabled = true;
            convertBtn.textContent = "Converting...";

            clearPreviousResults();
            let failedCount = 0;

            try {
                for (const file of selectedFiles) {
                    try {
                        const lastDot = file.name.lastIndexOf('.');
                        const ext = lastDot !== -1 ? file.name.substring(lastDot).toLowerCase() : '';
                        
                        info.textContent = "Converting: " + file.name;

                        if (ext === ".heic" || ext === ".heif") {
                            await convertHEIC(file);
                        } else if (file.type === "application/pdf" || ext === ".pdf") {
                            await convertPDF(file);
                        } else if (ext === ".avif") {
                            await convertAVIF(file);
                        } else {
                            await convertImage(file);
                        }
                    } catch (error) {
                        console.error(error);
                        failedCount++;
                        showResult(file.name, `Failed: ${error.message || "Error"} ❌`);
                    }
                }

                if (failedCount === selectedFiles.length) {
                    info.textContent = "Conversions failed ❌";
                } else {
                    info.textContent = failedCount > 0 ? `Finished with ${failedCount} error(s) ⚠️` : "All conversions finished ✔";
                    if (convertedBlobs.length > 1) {
                        downloadZipBtn.style.display = "inline-block";
                    }
                }
            } finally {
                isConverting = false;
                convertBtn.disabled = false;
                convertBtn.textContent = "Convert All";
            }
        });

        downloadZipBtn.addEventListener("click", () => {
            if (convertedBlobs.length === 0) return;
            downloadZipBtn.disabled = true;

            try {
                const zip = new JSZip();
                const usedNames = {};
                
                convertedBlobs.forEach(item => {
                    let nameToUse = item.name;
                    if (usedNames[nameToUse] !== undefined) {
                        usedNames[nameToUse]++;
                        const lastDot = nameToUse.lastIndexOf('.');
                        const base = lastDot !== -1 ? nameToUse.substring(0, lastDot) : nameToUse;
                        const ext = lastDot !== -1 ? nameToUse.substring(lastDot) : '';
                        nameToUse = `${base}_(${usedNames[nameToUse]})${ext}`;
                    } else {
                        usedNames[nameToUse] = 0;
                    }
                    zip.file(nameToUse, item.blob);
                });

                info.textContent = "Generating ZIP file... ⏳";
                zip.generateAsync({ type: "blob" }).then((content) => {
                    if (zipCleanupTimerId !== null) {
                        clearTimeout(zipCleanupTimerId);
                        zipCleanupTimerId = null;
                    }
                    if (currentZipUrl !== null) {
                        URL.revokeObjectURL(currentZipUrl);
                        currentZipUrl = null;
                    }

                    const link = document.createElement("a");
                    const zipUrl = URL.createObjectURL(content);
                    currentZipUrl = zipUrl;

                    link.href = zipUrl;
                    link.download = "converted_files_tone_pics.zip";
                    document.body.appendChild(link);
                    link.click();
                    link.remove();

                    zipCleanupTimerId = setTimeout(() => {
                        URL.revokeObjectURL(zipUrl);
                        if (currentZipUrl === zipUrl) currentZipUrl = null;
                        zipCleanupTimerId = null;
                        convertedBlobs = [];
                        downloadZipBtn.style.display = "none";
                    }, 60000);

                    info.textContent = "ZIP downloaded successfully! ✔";
                    downloadZipBtn.disabled = false;
                }).catch((error) => {
                    console.error(error);
                    info.textContent = "Failed to generate ZIP ❌";
                    downloadZipBtn.disabled = false;
                });
            } catch (syncError) {
                console.error(syncError);
                info.textContent = "Failed to prepare ZIP ❌";
                downloadZipBtn.disabled = false;
            }
        });

        function getBaseName(fileName) {
            const lastDot = fileName.lastIndexOf('.');
            return lastDot !== -1 ? fileName.substring(0, lastDot) : fileName;
        }

        function getTargetFormat() {
            if (format.value === "webp") return { mimeType: "image/webp", extension: "webp" };
            if (format.value === "png") return { mimeType: "image/png", extension: "png" };
            return { mimeType: "image/jpeg", extension: "jpg" };
        }

        function setupCanvas(imgWidth, imgHeight, targetMime) {
            const canvas = document.createElement("canvas");
            canvas.width = imgWidth;
            canvas.height = imgHeight;
            const ctx = canvas.getContext("2d");

            if (targetMime === "image/jpeg") {
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            return { canvas, ctx };
        }

        function convertImage(file) {
            return new Promise((resolve, reject) => {
                const objectUrl = URL.createObjectURL(file);
                const img = new Image();

                img.onload = function () {
                    try {
                        const { mimeType, extension } = getTargetFormat();
                        const { canvas, ctx } = setupCanvas(img.naturalWidth, img.naturalHeight, mimeType);

                        ctx.drawImage(img, 0, 0);

                        canvas.toBlob((blob) => {
                            URL.revokeObjectURL(objectUrl);
                            canvas.width = canvas.height = 0;

                            if (!blob) { reject(new Error("Blob generation failed")); return; }
                            const outputName = getBaseName(file.name) + "." + extension;
                            createDownload(blob, outputName);
                            convertedBlobs.push({ blob, name: outputName });
                            resolve();
                        }, mimeType, Number(quality.value) / 100);
                    } catch (err) {
                        URL.revokeObjectURL(objectUrl);
                        reject(err);
                    }
                };
                img.onerror = () => {
                    URL.revokeObjectURL(objectUrl);
                    reject(new Error("Corrupted image or unsupported format"));
                };
                img.src = objectUrl;
            });
        }

        async function convertHEIC(file) {
            if (typeof heic2any === "undefined") {
                throw new Error("HEIC library not loaded from CDN yet.");
            }

            const { mimeType: finalMime, extension: finalExt } = getTargetFormat();
            const heicTargetMime = finalMime === "image/webp" ? "image/jpeg" : finalMime;

            const result = await heic2any({
                blob: file,
                toType: heicTargetMime,
                quality: Number(quality.value) / 100
            });

            let rawBlob = Array.isArray(result) ? result[0] : result;

            const finalBlob = (heicTargetMime === finalMime)
                ? rawBlob
                : await blobToFormat(rawBlob, finalMime, Number(quality.value) / 100);

            const outputName = getBaseName(file.name) + "." + finalExt;
            createDownload(finalBlob, outputName);
            convertedBlobs.push({ blob: finalBlob, name: outputName });
        }

        function blobToFormat(blob, mimeType, qualityValue) {
            return new Promise((resolve, reject) => {
                const objectUrl = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = function () {
                    const { canvas, ctx } = setupCanvas(img.naturalWidth, img.naturalHeight, mimeType);
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob((outBlob) => {
                        URL.revokeObjectURL(objectUrl);
                        canvas.width = canvas.height = 0;
                        if (!outBlob) { reject(new Error("Re-encoding failed")); return; }
                        resolve(outBlob);
                    }, mimeType, qualityValue);
                };
                img.onerror = () => {
                    URL.revokeObjectURL(objectUrl);
                    reject(new Error("Re-encoding failed"));
                };
                img.src = objectUrl;
            });
        }

        async function convertAVIF(file) {
            return new Promise((resolve, reject) => {
                const objectUrl = URL.createObjectURL(file);
                const img = new Image();

                img.onload = function () {
                    try {
                        const { mimeType, extension } = getTargetFormat();
                        const { canvas, ctx } = setupCanvas(img.naturalWidth, img.naturalHeight, mimeType);

                        ctx.drawImage(img, 0, 0);

                        canvas.toBlob((blob) => {
                            URL.revokeObjectURL(objectUrl);
                            canvas.width = canvas.height = 0;
                            if (!blob) { reject(new Error("AVIF conversion failed")); return; }
                            const outputName = getBaseName(file.name) + "." + extension;
                            createDownload(blob, outputName);
                            convertedBlobs.push({ blob, name: outputName });
                            resolve();
                        }, mimeType, Number(quality.value) / 100);
                    } catch (err) {
                        URL.revokeObjectURL(objectUrl);
                        reject(err);
                    }
                };
                img.onerror = () => {
                    URL.revokeObjectURL(objectUrl);
                    reject(new Error("AVIF decoding not supported natively by this device/browser."));
                };
                img.src = objectUrl;
            });
        }

        async function convertPDF(file) {
            if (!window['pdfjsLib'] && !initPdfWorker()) {
                throw new Error("PDF.js library is missing or hasn't finished loading.");
            }

            try {
                const buffer = await file.arrayBuffer();
                const pdf = await window['pdfjsLib'].getDocument({ data: buffer }).promise;
                const { mimeType, extension } = getTargetFormat();

                for (let i = 1; i <= pdf.numPages; i++) {
                    info.textContent = `Converting ${file.name} (Page ${i}/${pdf.numPages}) ⏳`;

                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });

                    const { canvas, ctx } = setupCanvas(viewport.width, viewport.height, mimeType);
                    const renderContext = { canvasContext: ctx, viewport: viewport };
                    const renderTask = page.render(renderContext);

                    try {
                        await renderTask.promise;
                    } catch (renderErr) {
                        try { renderTask.cancel(); } catch (cancelErr) {}
                        canvas.width = canvas.height = 0;
                        throw renderErr;
                    }

                    await new Promise((resolve, reject) => {
                        canvas.toBlob((blob) => {
                            canvas.width = canvas.height = 0;

                            if (!blob) { reject(new Error(`PDF page ${i} failed`)); return; }
                            const outputName = getBaseName(file.name) + `_page_${i}.` + extension;
                            createDownload(blob, outputName);
                            convertedBlobs.push({ blob, name: outputName });
                            resolve();
                        }, mimeType, Number(quality.value) / 100);
                    });

                    page.cleanup();
                }
            } catch (error) {
                console.error(error);
                throw new Error(error.message || "Failed to parse PDF file.");
            }
        }

        function createDownload(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const entry = { url, timerId: null };
            activeDownloads.push(entry);

            const item = document.createElement("div");
            item.className = "result-item";

            const text = document.createElement("p");
            text.textContent = fileName;

            const button = document.createElement("button");
            button.className = "btn-download-single";
            button.textContent = "Download";

            button.onclick = function () {
                const link = document.createElement("a");
                link.href = url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                link.remove();
            };

            item.appendChild(text);
            item.appendChild(button);
            results.appendChild(item);

            entry.timerId = setTimeout(() => {
                const index = activeDownloads.indexOf(entry);
                if (index > -1) {
                    URL.revokeObjectURL(entry.url);
                    activeDownloads.splice(index, 1);
                    
                    button.disabled = true;
                    button.textContent = "Expired";
                    button.style.backgroundColor = "#2d2d34"; 
                    button.style.cursor = "not-allowed";
                }
            }, 300000); // Expirations check set at 5 Minutes pipeline loop
        }

        function showResult(name, status) {
            const item = document.createElement("div");
            item.className = "result-item";
            item.innerHTML = `<p style="color:#ef4444;">${name} : ${status}</p>`;
            results.appendChild(item);
        }

        function formatSize(bytes) {
            if (bytes < 1024) { return bytes + " Bytes"; }
            if (bytes < 1024 * 1024) { return (bytes / 1024).toFixed(2) + " KB"; }
            return (bytes / (1024 * 1024)).toFixed(2) + " MB";
        }
