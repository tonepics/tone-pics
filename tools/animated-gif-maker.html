<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tone.pics | GIF Maker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js/dist/gif.js"></script>
    <style>
        :root { --bg:#0e0f12; --panel:#15171c; --accent:#ffd23f; --text:#e9eaee; --line:#2a2d34; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar Styling */
        #sidebar { width: 320px; background: var(--panel); padding: 20px; border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 15px; }
        
        /* Editor Area */
        #main { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; }
        #canvas-wrapper { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #000; border-radius: 8px; }
        
        /* Timeline */
        #timeline { height: 120px; background: var(--panel); margin-top: 15px; display: flex; gap: 10px; padding: 10px; overflow-x: auto; border-radius: 8px; }
        .frame { width: 80px; height: 80px; background: #333; cursor: pointer; border: 2px solid #555; }
        
        button { background: var(--accent); border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        input { width: 100%; padding: 8px; background: #2a2d34; border: 1px solid var(--line); color: #fff; }
    </style>
</head>
<body>

<aside id="sidebar">
    <h2>GIF Pro Maker</h2>
    <input type="file" id="upload" multiple accept="image/*">
    
    <label>Delay (ms)</label>
    <input type="number" id="delay" value="500">
    
    <button onclick="addText()">Add Text Overlay</button>
    <button id="generate" style="background:#28a745; color:#fff;">Generate GIF</button>
    <div id="status"></div>
</aside>

<main id="main">
    <div id="canvas-wrapper">
        <canvas id="canvas" width="512" height="512"></canvas>
    </div>
    <div id="timeline"></div>
</main>

<script>
    const canvas = new fabric.Canvas('canvas');
    const timeline = document.getElementById('timeline');
    let frames = [];

    document.getElementById('upload').onchange = (e) => {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (event) => {
                fabric.Image.fromURL(event.target.result, (img) => {
                    frames.push(img);
                    const div = document.createElement('div');
                    div.className = 'frame';
                    div.style.backgroundImage = `url(${event.target.result})`;
                    div.style.backgroundSize = 'cover';
                    div.onclick = () => { canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas)); };
                    timeline.appendChild(div);
                });
            };
            reader.readAsDataURL(file);
        });
    };

    function addText() {
        const text = new fabric.IText('Your Text', { left: 50, top: 50, fill: '#ffd23f' });
        canvas.add(text);
    }

    document.getElementById('generate').onclick = () => {
        document.getElementById('status').innerText = "Processing...";
        const gif = new GIF({ workers: 2, quality: 10, width: 512, height: 512 });
        
        frames.forEach(img => {
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
            gif.addFrame(canvas.getElement(), { delay: parseInt(document.getElementById('delay').value) });
        });
        
        gif.on('finished', (blob) => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my-gif.gif';
            a.click();
            document.getElementById('status').innerText = "Done!";
        });
        gif.render();
    };
</script>
</body>
</html>
