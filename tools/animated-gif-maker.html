<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone.pics | Animated GIF Maker</title>
    <style>
        :root { --bg:#0e0f12; --panel:#15171c; --accent:#ffd23f; --text:#e9eaee; --line:#2a2d34; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .panel { background: var(--panel); padding: 25px; border-radius: 14px; border: 1px solid var(--line); }
        .title-area { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .icon { width: 32px; height: 32px; }
        .drop-zone { border: 2px dashed var(--line); padding: 30px; text-align: center; cursor: pointer; color: #9a9ea8; border-radius: 10px; margin-bottom: 20px; }
        .drop-zone:hover { border-color: var(--accent); }
        button { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        #preview { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--line); }
        #downloadBtn { display: none; background: #28a745; color: white; text-decoration: none; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; }
        .status { margin: 10px 0; color: #ffd23f; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="title-area">
            <img src="../222.PNG" class="icon" alt="Icon">
            <h2>GIF Maker</h2>
        </div>
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            Upload Images
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
        </div>
        <button id="generateBtn">Generate GIF</button>
        <div id="status" class="status"></div>
    </div>
    
    <div class="panel">
        <h2>Preview</h2>
        <img id="preview" alt="Preview">
        <br>
        <a id="downloadBtn" href="#">Download GIF</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
<script>
    const fileInput = document.getElementById('fileInput');
    const generateBtn = document.getElementById('generateBtn');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');

    generateBtn.onclick = () => {
        if(fileInput.files.length === 0) return alert("Please upload images first!");
        status.innerText = "Processing... Please wait.";
        
        let images = [];
        Array.from(fileInput.files).forEach(file => {
            let reader = new FileReader();
            reader.onload = (e) => {
                images.push(e.target.result);
                if(images.length === fileInput.files.length) {
                    gifshot.createGIF({
                        images: images,
                        gifWidth: 400,
                        gifHeight: 400,
                        interval: 0.5
                    }, (obj) => {
                        if(!obj.error) {
                            preview.src = obj.image;
                            preview.style.display = "block";
                            downloadBtn.href = obj.image;
                            downloadBtn.download = "tone-pics-animation.gif";
                            downloadBtn.style.display = "block";
                            status.innerText = "Success! GIF is ready.";
                        } else {
                            status.innerText = "Error: Could not generate.";
                        }
                    });
                }
            };
            reader.readAsDataURL(file);
        });
    };
</script>
</body>
</html>
