<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone.pics | Animated GIF Maker</title>
    <style>
        :root{ --bg:#0e0f12; --panel:#15171c; --panel2:#1b1e24; --line:#2a2d34; --text:#e9eaee; --accent:#ffd23f; }
        body{ background:var(--bg); color:var(--text); font-family: sans-serif; margin:0; padding:20px; }
        .container{ max-width: 800px; margin: auto; background: var(--panel); padding: 30px; border-radius: 14px; border: 1px solid var(--line); }
        h2{ color: var(--text); margin-top: 0; }
        .drop-zone{ border: 2px dashed var(--line); padding: 30px; text-align: center; cursor: pointer; color: var(--accent); border-radius: 10px; margin-bottom: 20px; }
        .controls{ display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        button{ background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #previewImage{ max-width: 100%; border-radius: 8px; margin-top: 20px; display: none; }
        #downloadBtn{ display: none; background: #28a745; color: white; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Animated GIF Maker</h2>
    <div class="drop-zone" id="dropZone">Click to upload images</div>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
    
    <div class="controls">
        <button id="createBtn">Generate GIF</button>
        <a id="downloadBtn">Download GIF</a>
    </div>
    
    <p id="status"></p>
    <img id="previewImage">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const createBtn = document.getElementById('createBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const status = document.getElementById('status');
    const preview = document.getElementById('previewImage');

    dropZone.onclick = () => fileInput.click();

    createBtn.onclick = () => {
        if(fileInput.files.length === 0) return alert("Please select images first!");
        status.innerText = "Processing... Please wait.";
        
        let images = [];
        let files = Array.from(fileInput.files);
        
        files.forEach(file => {
            let reader = new FileReader();
            reader.onload = (e) => {
                images.push(e.target.result);
                if(images.length === files.length) {
                    gifshot.createGIF({
                        images: images,
                        gifWidth: 400,
                        gifHeight: 400,
                        interval: 0.5
                    }, (obj) => {
                        if(!obj.error) {
                            preview.src = obj.image;
                            preview.style.display = "block";
                            downloadBtn.href = obj.image;
                            downloadBtn.download = "animated.gif";
                            downloadBtn.style.display = "inline-block";
                            status.innerText = "Done!";
                        }
                    });
                }
            };
            reader.readAsDataURL(file);
        });
    };
</script>
</body>
</html>
