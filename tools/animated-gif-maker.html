<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tone.pics | Pro GIF Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js/dist/gif.js"></script>
    <style>
        body { margin:0; background:#111; color:#fff; font-family:sans-serif; display:flex; height:100vh; overflow:hidden; }
        #toolbar { width:280px; background:#1a1d23; padding:15px; display:flex; flex-direction:column; gap:10px; border-right:1px solid #333; }
        #canvas-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #timeline { height:120px; width:100%; background:#000; display:flex; gap:5px; padding:10px; overflow-x:auto; }
        .frame-box { min-width:80px; height:80px; border:2px solid #555; background-size:cover; cursor:pointer; }
        .btn { background:#ffd23f; border:none; padding:10px; cursor:pointer; font-weight:bold; border-radius:4px; }
    </style>
</head>
<body>

<div id="toolbar">
    <h3>Pro GIF Maker</h3>
    <input type="file" id="upload" multiple accept="image/*">
    <button class="btn" onclick="addText()">Add Text</button>
    <button class="btn" onclick="applyFilter()">Grayscale Filter</button>
    <button class="btn" style="background:#28a745; color:#fff" onclick="generate()">Generate GIF</button>
    <div id="msg"></div>
</div>

<div id="canvas-area">
    <canvas id="c" width="512" height="512"></canvas>
    <div id="timeline"></div>
</div>

<script>
    const canvas = new fabric.Canvas('c');
    let frames = [];

    document.getElementById('upload').onchange = (e) => {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const f = { src: ev.target.result, filter: false };
                frames.push(f);
                const div = document.createElement('div');
                div.className = 'frame-box';
                div.style.backgroundImage = `url(${f.src})`;
                div.onclick = () => loadFrame(f);
                document.getElementById('timeline').appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    };

    function loadFrame(f) {
        canvas.clear();
        fabric.Image.fromURL(f.src, (img) => {
            if(f.filter) img.filters.push(new fabric.Image.filters.Grayscale());
            img.applyFilters();
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
        });
    }

    function addText() {
        canvas.add(new fabric.IText('Tone.pics', { left: 50, top: 50, fill: '#ffd23f' }));
    }

    function applyFilter() {
        const bg = canvas.backgroundImage;
        if(bg) {
            bg.filters.push(new fabric.Image.filters.Grayscale());
            bg.applyFilters();
            canvas.renderAll();
        }
    }

    async function generate() {
        document.getElementById('msg').innerText = "Rendering...";
        const gif = new GIF({ workers: 2, quality: 10, width: 512, height: 512 });
        for(let f of frames) {
            await new Promise(r => fabric.Image.fromURL(f.src, (img) => {
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { onComplete: () => {
                    gif.addFrame(canvas.getElement(), { delay: 500 });
                    r();
                }});
            }));
        }
        gif.on('finished', (b) => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'pro.gif'; a.click();
            document.getElementById('msg').innerText = "Done!";
        });
        gif.render();
    }
</script>
</body>
</html>
