<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photo Editor - Tone.pics</title>

<link rel="stylesheet" href="tool-style.css">

<!-- Professional Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@400;700&family=Cinzel:wght@600&family=Marck+Script&family=Courier+Prime&display=swap" rel="stylesheet">

<style>

.editor-layout {
    display:grid;
    grid-template-columns:1fr 320px;
    gap:20px;
}

@media(max-width:900px){
    .editor-layout{
        grid-template-columns:1fr;
    }
}


.canvas-area {
    background:#111;
    min-height:500px;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px dashed #444;
    overflow:hidden;
}


#editorCanvas {
    max-width:100%;
    max-height:70vh;
    display:none;
    border-radius:10px;
}


.upload-box {
    text-align:center;
    cursor:pointer;
    padding:40px;
}


.upload-box span{
    font-size:50px;
}


.controls {
    background:#1a1a1e;
    padding:20px;
    border-radius:15px;
}


.control-group{
    margin-bottom:18px;
}


.control-group label{
    display:block;
    margin-bottom:6px;
}


input[type="range"]{
    width:100%;
}


button,
select,
input{
    width:100%;
}


.editor-btn{

    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;

}


</style>

</head>


<body>


<div class="tool-container">


<a class="back-home" href="../index.html">
← Back Home
</a>



<div class="tool-header">

<h1>🖼️ Photo Editor</h1>

<p>Edit images online professionally.</p>

</div>



<div class="tool-box">


<div class="editor-layout">



<!-- Canvas Area -->

<div class="canvas-area" id="dropZone">


<div class="upload-box" id="uploadBox">

<span>🖼️</span>

<p>
Drag & Drop Image Here
<br>
or Click To Upload
</p>


<input 
type="file"
id="imageInput"
accept="image/*"
hidden>


</div>


<canvas id="editorCanvas"></canvas>


</div>





<!-- Controls -->

<div class="controls">


<h3>Basic Tools</h3>



<div class="control-group">

<label>
Zoom
</label>

<input 
type="range"
id="zoom"
min="10"
max="200"
value="100">

</div>




<div class="control-group">

<label>
Rotation
</label>

<input 
type="range"
id="rotation"
min="-180"
max="180"
value="0">

</div>




<button 
class="editor-btn"
id="resetBtn">

Reset

</button>


<button 
class="editor-btn"
id="downloadBtn">

Download

</button>



</div>


</div>


</div>


</div>




<footer>

© 2026 Tone.pics

</footer>





<script>


const imageInput =
document.getElementById("imageInput");


const uploadBox =
document.getElementById("uploadBox");


const dropZone =
document.getElementById("dropZone");


const canvas =
document.getElementById("editorCanvas");


const ctx =
canvas.getContext("2d");


const zoom =
document.getElementById("zoom");


const rotation =
document.getElementById("rotation");


const resetBtn =
document.getElementById("resetBtn");


const downloadBtn =
document.getElementById("downloadBtn");



let image =
new Image();


let imageLoaded=false;



let state={

zoom:1,

rotation:0

};






uploadBox.onclick=()=>{

imageInput.click();

};




imageInput.onchange=e=>{

loadImage(e.target.files[0]);

};






dropZone.ondragover=e=>{

e.preventDefault();

dropZone.classList.add("active");

};




dropZone.ondragleave=()=>{

dropZone.classList.remove("active");

};




dropZone.ondrop=e=>{

e.preventDefault();

dropZone.classList.remove("active");

loadImage(
e.dataTransfer.files[0]
);

};







function loadImage(file){


if(!file || !file.type.startsWith("image/"))
return;


const url =
URL.createObjectURL(file);


image.onload=()=>{


canvas.style.display="block";

uploadBox.style.display="none";


canvas.width=image.width;

canvas.height=image.height;


imageLoaded=true;


render();


URL.revokeObjectURL(url);


};


image.src=url;


}






zoom.oninput=()=>{

state.zoom =
zoom.value /100;

render();

};



rotation.oninput=()=>{

state.rotation =
rotation.value;

render();

};







function render(){


if(!imageLoaded)
return;


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);


ctx.save();



ctx.translate(
canvas.width/2,
canvas.height/2
);



ctx.rotate(
state.rotation*Math.PI/180
);



ctx.scale(
state.zoom,
state.zoom
);



ctx.drawImage(

image,

-image.width/2,

-image.height/2

);



ctx.restore();



}







resetBtn.onclick=()=>{


state.zoom=1;

state.rotation=0;


zoom.value=100;

rotation.value=0;


render();


};







downloadBtn.onclick=()=>{


if(!imageLoaded)
return;


const link =
document.createElement("a");


link.download="edited-image.png";


link.href=
canvas.toDataURL("image/png");


link.click();


};



</script>


</body>

</html>
