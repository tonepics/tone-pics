<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Photo Editor Online | Tone.pics Style</title>
    <!-- Google Fonts for professional typography rendering -->
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Dancing+Script&family=Inter:wght@400;600;700&family=Montserrat:wght@700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f0f11;
            --bg-card: #18181c;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #2d2d34;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Style - More Compact */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .btn-home:hover {
            color: var(--text-main);
        }

        /* Hero Section - Shrunk */
        .hero-section {
            text-align: center;
            padding: 20px 20px 10px 20px;
        }

        .hero-section h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            color: var(--text-muted);
            font-size: 0.9rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Main Workspace Container */
        .editor-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 1200px;
            margin: 10px auto;
            padding: 0 15px;
            width: 100%;
            flex: 1;
        }

        /* Controls Sidebar - Narrower & More Compact spacing */
        .controls-sidebar {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            width: 280px; /* Reduced width from 350px */
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: fit-content;
            max-height: 80vh;
            overflow-y: auto; /* Scroll inside sidebar if content overflows */
        }

        /* Custom small scrollbar for sidebar */
        .controls-sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .controls-sidebar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 2px;
        }

        .control-group {
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .control-group:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .control-group h3 {
            font-size: 0.85rem; /* Smaller font */
            color: var(--text-main);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Sliders and Range Wrappers */
        .range-wrapper {
            margin-bottom: 8px;
        }

        .range-wrapper label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem; /* Smaller labels */
            color: var(--text-muted);
            margin-bottom: 3px;
        }

        .range-wrapper input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            background: #2d2d34;
            height: 4px; /* Thinner range bar */
            border-radius: 2px;
            outline: none;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        button {
            background-color: #252529;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 6px 10px; /* Smaller padding */
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem; /* Smaller text */
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        button:hover {
            background-color: #2d2d34;
            border-color: #4b5563;
        }
        
        button.active-mode {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        /* Inputs & Select Elements */
        .text-input-field, select {
            width: 100%;
            background-color: #0f0f11;
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            outline: none;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .color-picker-wrapper input[type="color"] {
            border: none;
            width: 30px;
            height: 22px;
            background: transparent;
            cursor: pointer;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Canvas Workspace Area - Auto Responsive scaling */
        .workspace {
            flex: 1;
            min-width: 300px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            height: 65vh; /* Maximum viewport restricted height */
            padding: 10px;
        }

        /* Drag & Drop Upload Zone */
        .dropzone {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #3f3f46;
            border-radius: 8px;
            margin: 15px;
            background-color: rgba(24, 24, 28, 0.5);
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
            z-index: 10;
        }

        .dropzone p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 0.85rem;
        }

        /* Canvas Editor Viewport - Scales image properly */
        .canvas-container {
            display: none;
            width: 100%;
            height: 100%;
            overflow: auto;
            align-items: center;
            justify-content: center;
        }

        canvas {
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Prevents raw huge layout overflow */
            cursor: default;
        }
        
        canvas.drawing-active {
            cursor: crosshair;
        }

        /* Floating Toolbar */
        .workspace-toolbar {
            position: absolute;
            bottom: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
            z-index: 5;
            background: rgba(15, 15, 17, 0.8);
            padding: 4px 8px;
            border-radius: 6px;
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
        }

        .btn-export {
            background-color: var(--accent);
            border-color: var(--accent);
        }
        .btn-export:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <a href="/" class="btn-home">
            <span>←</span> Back Home
        </a>
        <div class="logo" style="font-weight: bold; font-size: 1rem; color: #fff;">📸 PhotoEditor Pro</div>
    </header>

    <!-- App Identity Hero -->
    <section class="hero-section">
        <h1>Edit Images Online Professionally</h1>
        <p>A fast, browser-based image editor to easily manipulate photos without watermarks.</p>
    </section>

    <!-- Main Editor Interface -->
    <main class="editor-container">
        
        <!-- Sidebar Controls Grid -->
        <aside class="controls-sidebar" id="sidebar">
            
            <!-- Transform and Zoom -->
            <div class="control-group">
                <h3>Transform & Zoom</h3>
                <div class="range-wrapper">
                    <label>
                        <span>Zoom</span>
                        <span id="zoom-val" style="color: var(--accent);">100%</span>
                    </label>
                    <input type="range" id="zoom-range" min="10" max="200" value="100">
                </div>
                <div class="btn-grid">
                    <button id="btn-rotate">🔄 Rotate 90°</button>
                    <button id="btn-flip-h">↔️ Flip Horiz.</button>
                    <button id="btn-flip-v">↕️ Flip Vert.</button>
                    <button id="btn-reset" style="color: #ef4444;">🧹 Reset All</button>
                </div>
            </div>

            <!-- Essential Adjustment Filters -->
            <div class="control-group">
                <h3>Adjustments & Filters</h3>
                
                <div class="range-wrapper">
                    <label><span>Brightness</span><span id="brightness-val">100%</span></label>
                    <input type="range" id="brightness" min="0" max="200" value="100">
                </div>

                <div class="range-wrapper">
                    <label><span>Contrast</span><span id="contrast-val">100%</span></label>
                    <input type="range" id="contrast" min="0" max="200" value="100">
                </div>

                <div class="range-wrapper">
                    <label><span>Saturation</span><span id="saturation-val">100%</span></label>
                    <input type="range" id="saturation" min="0" max="200" value="100">
                </div>

                <div class="range-wrapper">
                    <label><span>Grayscale</span><span id="grayscale-val">0%</span></label>
                    <input type="range" id="grayscale" min="0" max="100" value="0">
                </div>

                <div class="range-wrapper">
                    <label><span>Sepia</span><span id="sepia-val">0%</span></label>
                    <input type="range" id="sepia" min="0" max="100" value="0">
                </div>

                <div class="range-wrapper">
                    <label><span>Blur</span><span id="blur-val">0px</span></label>
                    <input type="range" id="blur" min="0" max="20" value="0">
                </div>
            </div>

            <!-- Typography & Text Overlay -->
            <div class="control-group">
                <h3>Text Overlay</h3>
                <input type="text" id="text-string" class="text-input-field" placeholder="Type text here...">
                
                <label style="font-size: 0.75rem; color: var(--text-muted);">Font Style</label>
                <select id="text-font">
                    <option value="'Inter', sans-serif">Modern</option>
                    <option value="'Playfair Display', serif">Classic</option>
                    <option value="'Courier Prime', monospace">Typewriter</option>
                    <option value="'Dancing Script', cursive">Handwriting</option>
                    <option value="'Montserrat', sans-serif">Bold</option>
                </select>

                <div class="range-wrapper">
                    <label><span>Font Size</span><span id="font-size-val">40px</span></label>
                    <input type="range" id="text-size" min="10" max="150" value="40">
                </div>

                <div class="color-picker-wrapper">
                    <label style="font-size: 0.75rem; color: var(--text-muted); flex: 1;">Text Color:</label>
                    <input type="color" id="text-color" value="#ffffff">
                </div>

                <div class="checkbox-wrapper">
                    <input type="checkbox" id="text-shadow" checked>
                    <label for="text-shadow">Enable Text Shadow</label>
                </div>
            </div>

            <!-- Export Configurations -->
            <div class="control-group">
                <h3>Export Image</h3>
                <div style="display: flex; gap: 6px;">
                    <select id="export-format" style="flex: 1; margin-bottom:0;">
                        <option value="image/jpeg">JPG</option>
                        <option value="image/png">PNG</option>
                        <option value="image/webp">WebP</option>
                    </select>
                    <button id="btn-download" class="btn-export">Save</button>
                </div>
            </div>

        </aside>

        <!-- Canvas Workspace Area -->
        <section class="workspace" id="workspace-area">
            
            <!-- Drag & Drop Zone -->
            <div class="dropzone" id="drop-zone">
                <span style="font-size: 2rem;">🖼️</span>
                <p>Drag & drop image here or click</p>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
            </div>

            <!-- Dynamic Canvas Wrapper -->
            <div class="canvas-container" id="canvas-holder">
                <canvas id="main-canvas"></canvas>
            </div>

            <!-- Contextual Active Toolbars -->
            <div class="workspace-toolbar hidden" id="w-toolbar">
                <button id="btn-change-img" style="font-size: 0.75rem; padding:4px 8px;">Change Image 🔁</button>
            </div>

        </section>

    </main>

    <script>
        // DOM Selectors
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const canvasHolder = document.getElementById('canvas-holder');
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const wToolbar = document.getElementById('w-toolbar');
        const btnChangeImg = document.getElementById('btn-change-img');
        const sidebar = document.getElementById('sidebar');

        // Manipulation Elements
        const zoomRange = document.getElementById('zoom-range');
        const zoomVal = document.getElementById('zoom-val');
        const brightnessInput = document.getElementById('brightness');
        const contrastInput = document.getElementById('contrast');
        const saturationInput = document.getElementById('saturation');
        const grayscaleInput = document.getElementById('grayscale');
        const sepiaInput = document.getElementById('sepia');
        const blurInput = document.getElementById('blur');

        // Typography Elements
        const textString = document.getElementById('text-string');
        const textFont = document.getElementById('text-font');
        const textSize = document.getElementById('text-size');
        const textColor = document.getElementById('text-color');
        const textShadow = document.getElementById('text-shadow');

        // Action Buttons
        const btnRotate = document.getElementById('btn-rotate');
        const btnFlipH = document.getElementById('btn-flip-h');
        const btnFlipV = document.getElementById('btn-flip-v');
        const btnReset = document.getElementById('btn-reset');
        const btnDownload = document.getElementById('btn-download');
        const exportFormat = document.getElementById('export-format');

        // State Machine Objects
        let originalImage = new Image();
        let rotation = 0; 
        let flipH = 1;    
        let flipV = 1;    
        let currentZoom = 100;

        // Extra canvas states
        let brushMode = false;
        let eraserMode = false;
        let drawing = false;
        let history = [];
        let historyStep = -1;
        let draggingText = false;

        // Dynamic Extra Controls UI Generation (Compact Styles)
        const textControls = document.createElement("div");
        textControls.className = "control-group";
        textControls.innerHTML = `
            <h3>Text Position</h3>
            <div class="range-wrapper">
                <label>Text X</label>
                <input type="range" id="text-x" min="0" max="100" value="50">
            </div>
            <div class="range-wrapper">
                <label>Text Y</label>
                <input type="range" id="text-y" min="0" max="100" value="50">
            </div>
            <div class="range-wrapper">
                <label>Opacity</label>
                <input type="range" id="text-opacity" min="0" max="100" value="100">
            </div>
        `;
        sidebar.insertBefore(textControls, btnDownload.closest('.control-group'));

        const extraButtons = document.createElement("div");
        extraButtons.className = "control-group";
        extraButtons.innerHTML = `
            <h3>Drawing & Tools</h3>
            <div class="btn-grid">
                <button id="btn-brush">🖌 Brush</button>
                <button id="btn-eraser">🧽 Eraser</button>
                <button id="btn-undo">↩ Undo</button>
                <button id="btn-redo">↪ Redo</button>
                <button id="btn-crop-center" style="grid-column: span 2;">✂ Crop Center</button>
            </div>
        `;
        sidebar.insertBefore(extraButtons, btnDownload.closest('.control-group'));

        const textXInput = document.getElementById("text-x");
        const textYInput = document.getElementById("text-y");
        const textOpacity = document.getElementById("text-opacity");
        const btnBrush = document.getElementById("btn-brush");
        const btnEraser = document.getElementById("btn-eraser");
        const btnUndo = document.getElementById("btn-undo");
        const btnRedo = document.getElementById("btn-redo");
        const btnCropCenter = document.getElementById("btn-crop-center");

        // Upload Mechanics
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) loadImage(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadImage(e.target.files[0]);
        });
        btnChangeImg.addEventListener('click', () => fileInput.click());

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage = new Image();
                originalImage.onload = function() {
                    resetSettings();
                    dropZone.classList.add('hidden');
                    canvasHolder.style.display = 'flex';
                    wToolbar.classList.remove('hidden');
                    
                    canvas.width = originalImage.width;
                    canvas.height = originalImage.height;
                    
                    renderCanvas();
                    
                    history = [];
                    historyStep = -1;
                    saveHistory();
                }
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function resetSettings() {
            rotation = 0; flipH = 1; flipV = 1; currentZoom = 100;
            zoomRange.value = 100; zoomVal.innerText = '100%';
            brightnessInput.value = 100; contrastInput.value = 100; saturationInput.value = 100;
            grayscaleInput.value = 0; sepiaInput.value = 0; blurInput.value = 0;
            textString.value = ''; textXInput.value = 50; textYInput.value = 50; textOpacity.value = 100;
            canvas.style.transform = `scale(1)`;
            disableDrawingModes();
            updateLabels();
        }

        function updateLabels() {
            document.getElementById('brightness-val').innerText = brightnessInput.value + '%';
            document.getElementById('contrast-val').innerText = contrastInput.value + '%';
            document.getElementById('saturation-val').innerText = saturationInput.value + '%';
            document.getElementById('grayscale-val').innerText = grayscaleInput.value + '%';
            document.getElementById('sepia-val').innerText = sepiaInput.value + '%';
            document.getElementById('blur-val').innerText = blurInput.value + 'px';
            document.getElementById('font-size-val').innerText = textSize.value + 'px';
        }

        function renderCanvas() {
            if (!originalImage.src) return;

            const isSwapped = rotation === 90 || rotation === 270;
            const targetWidth = isSwapped ? originalImage.height : originalImage.width;
            const targetHeight = isSwapped ? originalImage.width : originalImage.height;

            canvas.width = targetWidth;
            canvas.height = targetHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();

            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate((rotation * Math.PI) / 180);
            ctx.scale(flipH, flipV);

            ctx.filter = `
                brightness(${brightnessInput.value}%)
                contrast(${contrastInput.value}%)
                saturate(${saturationInput.value}%)
                grayscale(${grayscaleInput.value}%)
                sepia(${sepiaInput.value}%)
                blur(${blurInput.value}px)
            `;

            ctx.drawImage(originalImage, -originalImage.width / 2, -originalImage.height / 2);
            ctx.restore(); 

            if (textString.value.trim() !== "") {
                ctx.save();
                ctx.globalAlpha = textOpacity.value / 100;
                ctx.font = `${textSize.value}px ${textFont.value}`;
                ctx.fillStyle = textColor.value;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                let x = canvas.width * (textXInput.value / 100);
                let y = canvas.height * (textYInput.value / 100);

                if (textShadow.checked) {
                    ctx.shadowColor = "rgba(0, 0, 0, 0.75)";
                    ctx.shadowBlur = 8;
                    ctx.shadowOffsetX = 4;
                    ctx.shadowOffsetY = 4;
                }

                ctx.fillText(textString.value, x, y);
                ctx.restore();
            }
        }

        const liveInputs = [brightnessInput, contrastInput, saturationInput, grayscaleInput, sepiaInput, blurInput, textString, textFont, textSize, textColor, textShadow, textXInput, textYInput, textOpacity];
        liveInputs.forEach(input => {
            input.addEventListener('input', () => {
                updateLabels();
                renderCanvas();
            });
        });

        zoomRange.addEventListener('input', (e) => {
            currentZoom = e.target.value;
            zoomVal.innerText = currentZoom + '%';
            canvas.style.transform = `scale(${currentZoom / 100})`;
        });

        btnRotate.addEventListener('click', () => { rotation = (rotation + 90) % 360; renderCanvas(); });
        btnFlipH.addEventListener('click', () => { flipH = flipH === 1 ? -1 : 1; renderCanvas(); });
        btnFlipV.addEventListener('click', () => { flipV = flipV === 1 ? -1 : 1; renderCanvas(); });
        btnReset.addEventListener('click', () => { resetSettings(); renderCanvas(); });

        function saveHistory() {
            if (!canvas.width || !canvas.height) return;
            if (historyStep < history.length - 1) {
                history = history.slice(0, historyStep + 1);
            }
            history.push(canvas.toDataURL());
            historyStep++;
            if (history.length > 20) {
                history.shift();
                historyStep--;
            }
        }

        function loadHistoryState() {
            let imgHistory = new Image();
            imgHistory.onload = function() {
                canvas.width = imgHistory.width;
                canvas.height = imgHistory.height;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(imgHistory, 0, 0);
                originalImage = imgHistory;
            };
            imgHistory.src = history[historyStep];
        }

        btnUndo.addEventListener('click', () => { if (historyStep > 0) { historyStep--; loadHistoryState(); } });
        btnRedo.addEventListener('click', () => { if (historyStep < history.length - 1) { historyStep++; loadHistoryState(); } });

        function disableDrawingModes() {
            brushMode = false;
            eraserMode = false;
            btnBrush.classList.remove('active-mode');
            btnEraser.classList.remove('active-mode');
            canvas.classList.remove('drawing-active');
        }

        btnBrush.addEventListener('click', () => {
            const turningOn = !brushMode;
            disableDrawingModes();
            if (turningOn) {
                brushMode = true;
                btnBrush.classList.add('active-mode');
                canvas.classList.add('drawing-active');
            }
        });

        btnEraser.addEventListener('click', () => {
            const turningOn = !eraserMode;
            disableDrawingModes();
            if (turningOn) {
                eraserMode = true;
                btnEraser.classList.add('active-mode');
                canvas.classList.add('drawing-active');
            }
        });

        function getCanvasMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener("mousedown", function(e) {
            if (brushMode || eraserMode) {
                drawing = true;
                draw(e);
            } else if (textString.value.trim() !== "") {
                const pos = getCanvasMousePos(e);
                const currentX = canvas.width * (textXInput.value / 100);
                const currentY = canvas.height * (textYInput.value / 100);
                const distance = Math.sqrt(Math.pow(pos.x - currentX, 2) + Math.pow(pos.y - currentY, 2));
                
                if (distance < 60) { 
                    draggingText = true;
                }
            }
        });

        canvas.addEventListener("mousemove", function(e) {
            if (drawing) {
                draw(e);
            } else if (draggingText) {
                const pos = getCanvasMousePos(e);
                textXInput.value = Math.max(0, Math.min(100, (pos.x / canvas.width) * 100));
                textYInput.value = Math.max(0, Math.min(100, (pos.y / canvas.height) * 100));
                renderCanvas();
            }
        });

        window.addEventListener("mouseup", function() {
            if (drawing) {
                drawing = false;
                saveHistory(); 
            }
            draggingText = false;
        });

        function draw(e) {
            const pos = getCanvasMousePos(e);
            ctx.save();
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 10, 0, Math.PI * 2);

            if (eraserMode) {
                ctx.globalCompositeOperation = "destination-out";
                ctx.fill();
            } else {
                ctx.globalCompositeOperation = "source-over";
                ctx.fillStyle = "#ffffff";
                ctx.fill();
            }
            ctx.restore();
        }

        btnCropCenter.addEventListener('click', () => {
            if (!originalImage.src) return;

            const cropWidth = canvas.width * 0.7;
            const cropHeight = canvas.height * 0.7;
            const startX = (canvas.width - cropWidth) / 2;
            const startY = (canvas.height - cropHeight) / 2;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = cropWidth;
            tempCanvas.height = cropHeight;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.drawImage(canvas, startX, startY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

            originalImage = new Image();
            originalImage.onload = function() {
                canvas.width = cropWidth;
                canvas.height = cropHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(originalImage, 0, 0);
                saveHistory();
            }
            originalImage.src = tempCanvas.toDataURL();
        });

        btnDownload.addEventListener('click', () => {
            if (!originalImage.src) return;
            const format = exportFormat.value; 
            let ext = format === 'image/png' ? 'png' : format === 'image/webp' ? 'webp' : 'jpg';

            const link = document.createElement('a');
            link.download = `photo-editor-${Date.now()}.${ext}`;
            link.href = canvas.toDataURL(format, 0.95);
            link.click();
        });

        // Append Footer
        const footer = document.createElement("footer");
        footer.style.textAlign = "center";
        footer.style.padding = "10px";
        footer.style.color = "#9ca3af";
        footer.style.fontSize = "0.75rem";
        footer.innerHTML = "© 2026 Tone.pics";
        document.body.appendChild(footer);
    </script>
</body>
</html>
