<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favicon Generator - Bloia.com</title>
    
    <link rel="stylesheet" href="../style.css">
    
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .tool-container {
            max-width: 900px;
            margin: 20px auto 40px auto; /* تقليل الهامش العلوي للحاوية بالكامل */
            padding: 20px;
        }

        /* رفع الشريط العلوي لأعلى نقطة وتصفير أي هوامش */
        .tool-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0 !important;
            padding-top: 0 !important;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #222;
        }

        /* تعديل اللون الافتراضي إلى الرمادي وعند الـ Hover يتحول للأبيض */
        .back-home {
            color: #aaa;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: #fff;
        }

        .header-logo {
            font-weight: bold;
            color: #fff;
        }

        .tool-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .tool-header h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .tool-header p {
            color: #aaa;
        }

        .tool-box {
            background: #1b1b1f;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
        }

        .drop-zone {
            border: 2px dashed #555;
            padding: 40px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        .drop-zone:hover {
            border-color: #6366f1;
        }

        .preview-box {
            margin: 20px auto;
            display: flex;
            justify-content: center;
        }

        #preview {
            max-width: 250px;
            max-height: 250px;
            border-radius: 12px;
            border: 1px solid #333;
            display: none;
        }

        .action-buttons {
            margin: 20px 0;
        }

        button {
            background: #4f46e5;
            color: white;
            border: 0;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            margin: 8px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #6366f1;
        }

        button.btn-secondary {
            background: #374151;
        }
        button.btn-secondary:hover {
            background: #4b5563;
        }

        button.btn-success {
            background: #10b981;
        }
        button.btn-success:hover {
            background: #059669;
        }

        .sizes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .size-card {
            background: #252529;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .size-card strong {
            font-size: 14px;
        }

        .size-card button {
            padding: 6px 12px;
            font-size: 12px;
            margin: 0;
            width: 100%;
        }

        canvas {
            display: none;
        }

        footer {
            text-align: center;
            color: #777;
            margin-top: 40px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="tool-container">

    <div class="tool-top-bar">
        <a class="back-home" href="../index.html">
            ← Back Home
        </a>
        <div class="header-logo">
            📱 Favicon
        </div>
    </div>

    <div class="tool-header">
        <h1>📱 Favicon Generator</h1>
        <p>Create favicons easily.</p>
    </div>

    <div class="tool-box">

        <div class="drop-zone" id="dropZone">
            📁 Drag & Drop Logo Here<br>or Click To Upload
            <input type="file" id="fileInput" accept="image/*" hidden>
        </div>

        <div class="preview-box">
            <img id="preview" alt="Source Preview">
        </div>

        <div class="action-buttons">
            <button onclick="generateFavicons()">Generate Favicons</button>
            <button class="btn-success" onclick="downloadZip()">Download All ZIP 📦</button>
        </div>

        <div class="sizes" id="results"></div>

    </div>
</div>

<canvas id="canvas"></canvas>

<footer>
   Bloia.com
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const fileInput = document.getElementById("fileInput");
    const dropZone = document.getElementById("dropZone");
    const preview = document.getElementById("preview");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const results = document.getElementById("results");

    let image = new Image();
    let faviconFiles = [];
    const sizes = [16, 32, 48, 64, 128, 256];

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = e => {
        if(e.target.files.length) loadImage(e.target.files[0]);
    };

    dropZone.ondragover = e => {
        e.preventDefault();
    };

    dropZone.ondrop = e => {
        e.preventDefault();
        if(e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]);
    };

    function loadImage(file) {
        if (!file || !file.type.startsWith("image/")) return;

        let reader = new FileReader();
        reader.onload = e => {
            image.onload = () => {
                preview.src = image.src;
                preview.style.display = "block";
                results.innerHTML = "";
                faviconFiles = [];
            };
            image.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function getCanvasBlob(canvasElement) {
        return new Promise(resolve => {
            canvasElement.toBlob(blob => {
                resolve(blob);
            }, "image/png");
        });
    }

    async function generateFavicons() {
        if (!image.src) {
            alert("Upload image first");
            return;
        }

        results.innerHTML = "";
        faviconFiles = [];

        const minDim = Math.min(image.width, image.height);
        const sx = (image.width - minDim) / 2;
        const sy = (image.height - minDim) / 2;

        for (const size of sizes) {
            canvas.width = size;
            canvas.height = size;

            ctx.clearRect(0, 0, size, size);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";
            
            ctx.drawImage(image, sx, sy, minDim, minDim, 0, 0, size, size);

            const blob = await getCanvasBlob(canvas);
            const name = `favicon-${size}x${size}.png`;

            faviconFiles.push({
                name: name,
                blob: blob
            });

            let card = document.createElement("div");
            card.className = "size-card";
            card.innerHTML = `
                <strong>${size}x${size}</strong>
                <button class="btn-secondary">Download</button>
            `;

            card.querySelector("button").onclick = () => {
                let url = URL.createObjectURL(blob);
                let a = document.createElement("a");
                a.href = url;
                a.download = name;
                a.click();
                URL.revokeObjectURL(url);
            };

            results.appendChild(card);
        }

        const icoBlob = await getCanvasBlob(canvas);
        faviconFiles.push({ name: "favicon.ico", blob: icoBlob });
        faviconFiles.push({ name: "favicon.png", blob: icoBlob });
    }

    async function downloadZip() {
        if (faviconFiles.length === 0) {
            alert("Generate favicons first");
            return;
        }

        let zip = new JSZip();

        faviconFiles.forEach(file => {
            zip.file(file.name, file.blob);
        });

        let content = await zip.generateAsync({ type: "blob" });
        let url = URL.createObjectURL(content);
        let a = document.createElement("a");
        a.href = url;
        a.download = "Bloia.com-favicons.zip";
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
