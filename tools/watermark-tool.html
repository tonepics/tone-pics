<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Watermark Tool | Bloia.com Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f0f11;
            --bg-card: #18181c;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #2d2d34;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Style - Compact & Elegant */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .btn-home:hover {
            color: var(--text-main);
        }

        /* Hero Section */
        .hero-section {
            text-align: center;
            padding: 20px 20px 10px 20px;
        }

        .hero-section h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            color: var(--text-muted);
            font-size: 0.85rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Main Workspace Container */
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 1200px;
            margin: 10px auto;
            padding: 0 15px;
            width: 100%;
            flex: 1;
        }

        /* Controls Sidebar */
        .control-panel {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            width: 290px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: fit-content;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* Custom small scrollbar for sidebar */
        .control-panel::-webkit-scrollbar {
            width: 4px;
        }
        .control-panel::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 2px;
        }

        .group {
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 0;
        }

        .group:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-main);
            margin-bottom: 6px;
            font-weight: 600;
        }

        /* Inputs, Select & File Buttons */
        input[type="text"], select, input[type="file"] {
            width: 100%;
            background-color: #0f0f11;
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            outline: none;
        }

        input[type="file"] {
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
        }

        .range-container {
            margin-bottom: 8px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            background: #2d2d34;
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            margin-bottom: 0;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .checkbox-wrapper input {
            accent-color: var(--accent);
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .color-picker-wrapper input[type="color"] {
            border: none;
            width: 30px;
            height: 22px;
            background: transparent;
            cursor: pointer;
        }

        /* Action Buttons */
        .btn {
            background-color: var(--accent);
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        /* Canvas Workspace Area */
        .viewer-panel {
            flex: 1;
            min-width: 300px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            height: 65vh;
            padding: 15px;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        /* Upload Placeholder Style */
        .upload-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border: 2px dashed #3f3f46;
            padding: 30px;
            border-radius: 8px;
            background: rgba(24, 24, 28, 0.5);
            cursor: pointer;
            width: 80%;
            max-width: 400px;
        }

        canvas {
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
            cursor: move;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="btn-home">
            <span>←</span> Back Home
        </a>
        <div class="logo" style="font-weight: bold; font-size: 1rem; color: #fff;">💧 Watermark Pro</div>
    </header>

    <section class="hero-section">
        <h1>Add Watermark to Images Online</h1>
        <p>Protect your visual property by easily applying custom text or logo overlays.</p>
    </section>

    <main class="container">
        
        <aside class="control-panel">
            
            <div class="group">
                <label>1. Base Image</label>
                <input type="file" id="main-image-input" accept="image/*">
            </div>

            <div class="group">
                <label>2. Watermark Type</label>
                <div class="radio-group">
                    <label><input type="radio" name="wm-type" value="text" checked> Text</label>
                    <label><input type="radio" name="wm-type" value="image"> Logo (Image)</label>
                </div>

                <div id="text-options">
                    <input type="text" id="wm-text" value="Tone.pics">
                    
                    <label>Font Family</label>
                    <select id="wm-font">
                        <option value="Inter">Inter (Default)</option>
                        <option value="Arial">Arial</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Impact">Impact</option>
                    </select>

                    <div class="color-picker-wrapper">
                        <label style="font-size: 0.75rem; color: var(--text-muted); flex: 1;">Color:</label>
                        <input type="color" id="wm-color" value="#ffffff">
                    </div>
                </div>

                <div id="image-options" class="hidden">
                    <label>Choose Logo Image</label>
                    <input type="file" id="wm-image-input" accept="image/*">
                </div>
            </div>

            <div class="group">
                <label>3. Advanced Settings</label>
                
                <label>Size</label>
                <div class="range-container">
                    <input type="range" id="wm-size" min="10" max="200" value="40">
                </div>

                <label>Opacity</label>
                <div class="range-container">
                    <input type="range" id="wm-opacity" min="0" max="100" value="70">
                </div>

                <label>Rotation (Degrees)</label>
                <div class="range-container">
                    <input type="range" id="wm-rotation" min="0" max="360" value="0">
                </div>

                <div class="checkbox-wrapper">
                    <input type="checkbox" id="wm-tile">
                    <label for="wm-tile">Repeat across image (Tile)</label>
                </div>
            </div>

            <div class="group">
                <label>4. Export Settings</label>
                <select id="export-format" style="margin-bottom: 8px;">
                    <option value="image/jpeg">JPG</option>
                    <option value="image/png">PNG</option>
                    <option value="image/webp">WebP</option>
                </select>
                <button class="btn" id="download-btn">Save Image ✨</button>
            </div>
        </aside>

        <section class="viewer-panel">
            
            <div class="upload-placeholder" id="placeholder-box" onclick="document.getElementById('main-image-input').click();">
                <span style="font-size: 2rem;">🖼️</span>
                <p>Upload an image to start working</p>
            </div>

            <div id="canvas-container" class="hidden">
                <canvas id="watermark-canvas"></canvas>
            </div>
            
            <p id="helper-text" style="font-size: 11px; color: var(--text-muted); margin-top: 10px;" class="hidden">
                * You can drag the text or logo directly to change its position dynamically.
            </p>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('watermark-canvas');
        const ctx = canvas.getContext('2d');

        // UI Target Nodes
        const mainImageInput = document.getElementById('main-image-input');
        const wmTypeRadios = document.querySelectorAll('input[name="wm-type"]');
        const textOptions = document.getElementById('text-options');
        const imageOptions = document.getElementById('image-options');
        const wmTextInput = document.getElementById('wm-text');
        const wmFontSelect = document.getElementById('wm-font');
        const wmColorInput = document.getElementById('wm-color');
        const wmImageInput = document.getElementById('wm-image-input');
        const wmSizeInput = document.getElementById('wm-size');
        const wmOpacityInput = document.getElementById('wm-opacity');
        const wmRotationInput = document.getElementById('wm-rotation');
        const wmTileCheckbox = document.getElementById('wm-tile');
        const downloadBtn = document.getElementById('download-btn');
        const exportFormat = document.getElementById('export-format');
        
        // Dynamic Workspace placeholders
        const placeholderBox = document.getElementById('placeholder-box');
        const canvasContainer = document.getElementById('canvas-container');
        const helperText = document.getElementById('helper-text');

        // Global State Tree Objects
        let mainImg = null;
        let wmImg = null;
        
        let wmX = 100;
        let wmY = 100;
        let isDragging = false;
        let startX, startY;

        // Toggle visibility triggers
        wmTypeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'text') {
                    textOptions.classList.remove('hidden');
                    imageOptions.classList.add('hidden');
                } else {
                    textOptions.classList.add('hidden');
                    imageOptions.classList.remove('hidden');
                }
                draw();
            });
        });

        // Reader stream initialization for background image
        mainImageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                mainImg = new Image();
                mainImg.onload = () => {
                    placeholderBox.classList.add('hidden');
                    canvasContainer.classList.remove('hidden');
                    helperText.classList.remove('hidden');
                    
                    canvas.width = mainImg.width;
                    canvas.height = mainImg.height;
                    
                    wmX = canvas.width / 2;
                    wmY = canvas.height / 2;
                    draw();
                };
                mainImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Layer overlay parsing for dynamic watermark graphics logo
        wmImageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                wmImg = new Image();
                wmImg.onload = () => {
                    draw();
                };
                wmImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Listeners for adjustments
        [wmTextInput, wmFontSelect, wmColorInput, wmSizeInput, wmOpacityInput, wmRotationInput, wmTileCheckbox].forEach(element => {
            element.addEventListener('input', draw);
            element.addEventListener('change', draw);
        });

        function draw() {
            if (!mainImg) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(mainImg, 0, 0);

            ctx.save();

            const type = document.querySelector('input[name="wm-type"]:checked').value;
            const opacity = wmOpacityInput.value / 100;
            const size = parseInt(wmSizeInput.value, 10);
            const angle = (parseInt(wmRotationInput.value, 10) * Math.PI) / 180;
            const isTile = wmTileCheckbox.checked;

            ctx.globalAlpha = opacity;

            if (isTile) {
                const stepX = size * 3;
                const stepY = size * 2;
                for (let x = 0; x < canvas.width + stepX; x += stepX) {
                    for (let y = 0; y < canvas.height + stepY; y += stepY) {
                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(angle);
                        renderWatermarkContent(type, size, 0, 0);
                        ctx.restore();
                    }
                }
            } else {
                ctx.translate(wmX, wmY);
                ctx.rotate(angle);
                renderWatermarkContent(type, size, 0, 0);
            }

            ctx.restore();
        }

        function renderWatermarkContent(type, size, x, y) {
            if (type === 'text') {
                const text = wmTextInput.value;
                const font = wmFontSelect.value;
                ctx.font = `${size}px ${font}`;
                ctx.fillStyle = wmColorInput.value;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, x, y);
            } else if (type === 'image' && wmImg) {
                const aspectRatio = wmImg.width / wmImg.height;
                const width = size * aspectRatio * 2;
                const height = size * 2;
                ctx.drawImage(wmImg, x - width / 2, y - height / 2, width, height);
            }
        }

        // Mouse & Touch coordinate translation
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function handleStart(e) {
            if (wmTileCheckbox.checked || !mainImg) return; 
            const pos = getMousePos(e);
            startX = pos.x;
            startY = pos.y;
            
            const hitRadius = parseInt(wmSizeInput.value) * 2; 
            if (Math.abs(pos.x - wmX) < hitRadius && Math.abs(pos.y - wmY) < hitRadius) {
                isDragging = true;
                if(!e.touches) e.preventDefault();
            }
        }

        function handleMove(e) {
            if (!isDragging) return;
            const pos = getMousePos(e);
            const dx = pos.x - startX;
            const dy = pos.y - startY;

            wmX += dx;
            wmY += dy;

            startX = pos.x;
            startY = pos.y;

            draw();
            if(!e.touches) e.preventDefault();
        }

        function handleEnd() {
            isDragging = false;
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: true });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // Download Pipeline Trigger Action
        downloadBtn.addEventListener('click', () => {
            if (!mainImg) {
                alert('Please upload an image first!');
                return;
            }
            const format = exportFormat.value; 
            const imageURL = canvas.toDataURL(format, 0.92);
            
            const link = document.createElement('a');
            const ext = format.split('/')[1];
            link.download = `watermark_${Date.now()}.${ext}`;
            link.href = imageURL;
            link.click();
        });

        // Append Compact Custom Dark Footer Element
        const footer = document.createElement("footer");
        footer.style.textAlign = "center";
        footer.style.padding = "15px 10px";
        footer.style.color = "var(--text-muted)";
        footer.style.fontSize = "0.75rem";
        footer.style.borderTop = "1px solid var(--border)";
        footer.style.marginTop = "auto";
        footer.innerHTML = "Bloia.com";
        document.body.appendChild(footer);
    </script>
</body>
</html>
