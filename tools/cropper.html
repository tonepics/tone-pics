<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Cropper - Tone.pics</title>

<link rel="stylesheet" href="tool-style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

</head>


<body>


<div class="tool-container">


<a class="back-home" href="../index.html">
← Back Home
</a>


<div class="tool-header">

<h1>✂️ Image Cropper</h1>

<p>
Crop your images professionally.
</p>

</div>



<div class="tool-box">


<input 
type="file"
id="imageInput"
accept="image/*"
>


<br><br>


<div>

<img id="image" style="max-width:100%;">

</div>


<br>


<button class="button" onclick="setRatio(1)">
1:1
</button>


<button class="button" onclick="setRatio(16/9)">
16:9
</button>


<button class="button" onclick="setRatio(4/3)">
4:3
</button>


<button class="button" onclick="cropImage()">
Crop
</button>


<button 
class="button"
id="download"
style="display:none;"
>
Download
</button>



</div>


</div>



<footer>

© 2026 Tone.pics

</footer>



<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>



<script>


let cropper;

const input =
document.getElementById("imageInput");

const image =
document.getElementById("image");

const download =
document.getElementById("download");



input.addEventListener("change",function(){


const file=this.files[0];


if(!file) return;


if(cropper){

cropper.destroy();

}



image.src =
URL.createObjectURL(file);



image.onload=function(){


cropper =
new Cropper(image,{

viewMode:1,

dragMode:"move",

autoCropArea:0.8,

responsive:true,

background:false


});


};



});




function setRatio(value){


if(cropper){

cropper.setAspectRatio(value);

}


}




function cropImage(){


if(!cropper)return;



const canvas =
cropper.getCroppedCanvas({

width:800,

height:800

});



download.style.display="inline-block";


download.onclick=function(){


const link =
document.createElement("a");


link.href =
canvas.toDataURL("image/jpeg");


link.download =
"cropped-image.jpg";


link.click();



};


}



</script>


</body>

</html>
