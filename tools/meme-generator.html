<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meme Generator - Tone.pics</title>

<link rel="stylesheet" href="../tool-style.css">

<style>

.meme-container{
    max-width:1200px;
    margin:auto;
    padding:25px;
}


.meme-header{
    text-align:center;
    margin-bottom:25px;
}


.meme-header h1{
    font-size:32px;
    margin-bottom:8px;
}


.meme-header p{
    color:#999;
}



.meme-layout{

    display:grid;
    grid-template-columns:320px 1fr;
    gap:20px;

}



.meme-card{

    background:#151515;
    border:1px solid #2b2b2b;
    border-radius:14px;
    padding:20px;

}



.meme-card h2{

    font-size:18px;
    margin-bottom:15px;

}



.upload-area{

    border:2px dashed #444;
    padding:25px 15px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;

}


.upload-area:hover{

    border-color:#ffd23f;
    color:#ffd23f;

}



.upload-area input{

    display:none;

}



.control{

    margin-top:15px;

}



.control label{

    display:block;
    font-size:13px;
    color:#aaa;
    margin-bottom:6px;

}



.control input,
.control select{

    width:100%;
    padding:10px;

    background:#202020;

    border:1px solid #333;

    border-radius:8px;

    color:white;

}



.canvas-box{

    min-height:600px;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#0c0c0c;

    border-radius:14px;

    overflow:hidden;

}



#memeCanvas{

    max-width:100%;

    max-height:600px;

}



.stickers{

    display:grid;

    grid-template-columns:repeat(6,1fr);

    gap:8px;

}



.sticker{

    background:#222;

    border:1px solid #333;

    border-radius:8px;

    padding:8px;

    text-align:center;

    font-size:22px;

    cursor:pointer;

}



.sticker:hover{

    border-color:#ffd23f;

}



.download-btn{

    width:100%;

    margin-top:20px;

    padding:12px;

    border:0;

    border-radius:8px;

    background:#ffd23f;

    color:#111;

    font-weight:800;

    cursor:pointer;

}



.download-btn:hover{

    opacity:.85;

}



@media(max-width:900px){

.meme-layout{

    grid-template-columns:1fr;

}

}


</style>

</head>


<body>


<div class="meme-container">


<div class="meme-header">

<h1>🎭 Meme Generator</h1>

<p>Create funny memes with your images, text and stickers.</p>

</div>



<div class="meme-layout">



<div class="meme-card">


<h2>Settings</h2>



<label class="upload-area">

📷 Upload Image

<input 
type="file"
id="imageInput"
accept="image/*">

</label>



<div class="control">

<label>
Top Text
</label>

<input 
id="topText"
type="text"
placeholder="TOP TEXT">

</div>



<div class="control">

<label>
Bottom Text
</label>

<input 
id="bottomText"
type="text"
placeholder="BOTTOM TEXT">

</div>



<div class="control">

<label>
Text Size
</label>

<input 
id="fontSize"
type="range"
min="20"
max="100"
value="50">

</div>



<div class="control">

<label>
Text Color
</label>

<input 
id="fontColor"
type="color"
value="#ffffff">

</div>


<div class="control">

<label>
Add Sticker
</label>


<div class="stickers">

<div class="sticker">😂</div>
<div class="sticker">🔥</div>
<div class="sticker">💯</div>
<div class="sticker">😎</div>
<div class="sticker">🤯</div>
<div class="sticker">❤️</div>


</div>


</div>



<button 
class="download-btn"
id="download">

Download Meme

</button>



</div>




<div class="meme-card canvas-box">


<canvas 
id="memeCanvas"
width="800"
height="800">
</canvas>


</div>



</div>


</div>

 <script>

const canvas = document.getElementById("memeCanvas");
const ctx = canvas.getContext("2d");


const imageInput = document.getElementById("imageInput");
const topText = document.getElementById("topText");
const bottomText = document.getElementById("bottomText");
const fontSize = document.getElementById("fontSize");
const fontColor = document.getElementById("fontColor");
const downloadBtn = document.getElementById("download");


let image = null;

let stickers = [];



imageInput.addEventListener("change", function(e){

    const file = e.target.files[0];

    if(!file) return;


    const reader = new FileReader();


    reader.onload = function(event){

        image = new Image();

        image.onload = function(){

            canvas.width = image.width;
            canvas.height = image.height;

            draw();

        };


        image.src = event.target.result;

    };


    reader.readAsDataURL(file);


});





function draw(){


    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );


    if(image){

        ctx.drawImage(
            image,
            0,
            0,
            canvas.width,
            canvas.height
        );

    }
    else{

        ctx.fillStyle="#222";

        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

    }



    drawText(
        topText.value,
        canvas.height * 0.12
    );


    drawText(
        bottomText.value,
        canvas.height * 0.88
    );



    stickers.forEach(function(item){


        ctx.font = item.size+"px Arial";

        ctx.textAlign="center";

        ctx.fillText(
            item.icon,
            item.x,
            item.y
        );


    });


}




function drawText(text,y){


    if(!text) return;



    let size = Number(fontSize.value);


    ctx.font =
    "bold "+size+"px Impact, Arial";



    ctx.textAlign="center";

    ctx.fillStyle = fontColor.value;


    ctx.strokeStyle="#000";

    ctx.lineWidth = size / 10;



    ctx.strokeText(
        text.toUpperCase(),
        canvas.width/2,
        y
    );


    ctx.fillText(
        text.toUpperCase(),
        canvas.width/2,
        y
    );


}






topText.addEventListener(
"input",
draw
);


bottomText.addEventListener(
"input",
draw
);



fontSize.addEventListener(
"input",
draw
);



fontColor.addEventListener(
"input",
draw
);






document.querySelectorAll(".sticker")
.forEach(function(button){


    button.addEventListener(
    "click",
    function(){


        stickers.push({

            icon:this.textContent,

            x:canvas.width/2,

            y:canvas.height/2,

            size:100

        });


        draw();


    });


});






downloadBtn.addEventListener(
"click",
function(){


    const link=document.createElement("a");


    link.download=
    "tonepics-meme.png";


    link.href=
    canvas.toDataURL(
        "image/png"
    );


    link.click();


});


</script> 
</body>

</html>
