<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Meme Generator - Tone.pics</title>
<meta name="description" content="Free online Meme Generator. Create memes with text, stickers, templates and drawing directly in your browser.">
<meta name="keywords" content="meme generator, meme maker, online meme creator, image editor">
<link rel="stylesheet" href="../tool-style.css">
</head>
<body>

<div class="app-container">
  <header class="tool-header">
    <a href="../index.html" class="back-button">← Back to Tools</a>
    <h1>Tone.pics <span>Meme Generator</span></h1>
    <p>Create memes with text, stickers, templates and drawing.</p>
  </header>

  <div class="workspace-grid">
    <div class="control-sidebar">

      <div class="tool-card">
        <div class="tool-card-header">1 · Templates</div>
        <div class="tool-card-body">
          <label for="imgLoader" class="zone-upload">
            <span>📂 Upload Image</span>
          </label>
          <input type="file" id="imgLoader" accept="image/*" style="display:none;">

          <div class="ctrl-group">
            <label>تقسيمات الصور المتعددة</label>
            <div class="grid-templates" id="templatesContainer"></div>
          </div>
        </div>
      </div>

      <div class="tool-card">
        <div class="tool-card-header">2 · Caption Generator</div>
        <div class="tool-card-body">
          <button class="btn-action primary" onclick="createNewTextLayer()">+ إضافة طبقة نص جديدة</button>
          <div id="textLayersBox" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
      </div>

      <div class="tool-card">
        <div class="tool-card-header">3 · التعبيرات والملصقات</div>
        <div class="tool-card-body">
          <div class="grid-emojis" id="emojisBox"></div>
          <div id="stickerLayersBox" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
      </div>

      <div class="tool-card">
        <div class="tool-card-header">4 · الرسم والفرشاة الحرة</div>
        <div class="tool-card-body">
          <div class="layout-split">
            <button class="btn-action" id="penTool" onclick="changeBrushMode('pen')">🖌️ قلم</button>
            <button class="btn-action" id="eraserTool" onclick="changeBrushMode('eraser')">🧼 ممحاة</button>
          </div>
          <button class="btn-action" id="disableDrawTool" onclick="changeBrushMode('off')" style="width:100%;">وضع التحديد العادي (مغلق)</button>
          
          <div class="layout-split">
            <div class="ctrl-group">
              <label>اللون</label>
              <div class="color-picker-box"><input type="color" id="brushColorPicker" value="#ef4444"><span>اللون</span></div>
            </div>
            <div class="ctrl-group">
              <label>الحجم</label>
              <div class="slider-container"><input type="range" id="brushThickness" min="2" max="40" value="8"><span id="thicknessValue">8</span></div>
            </div>
          </div>
          <button class="btn-action danger" onclick="resetDrawLayer()" style="width:100%;">مسح لوحة الرسم بالكامل</button>
        </div>
      </div>

    </div>

    <div class="preview-theater checkerboard" id="theaterZone">
      <div class="empty-stage-hint" id="stageHint">
        <h3>ابدأ صناعة الميم الخاص بك الآن</h3>
        <p>ارفع الصورة الأساسية، أو اختر قالباً مقسماً للبدء فوراً.</p>
      </div>
      <canvas id="memeCanvas" width="800" height="800"></canvas>
    </div>
  </div>

  <div class="footer-bar">
    <div class="engine-status" id="dimensionsLabel">Ready</div>
    <div class="download-cluster">
      <select id="downloadExtension">
        <option value="image/png">صيغة PNG</option>
        <option value="image/jpeg">صيغة JPEG</option>
      </select>
      <button class="btn-download" id="downloadTrigger" onclick="triggerMemeDownload()" disabled>Download</button>
    </div>
  </div>
</div>

<div class="toast-message" id="toastAlert"></div>
<input type="file" id="partitionLoader" accept="image/*" style="display:none;">

<script>
(function(){
"use strict";

const canvas = document.getElementById('memeCanvas');
const ctx = canvas.getContext('2d');
const stageHint = document.getElementById('stageHint');
const dimensionsLabel = document.getElementById('dimensionsLabel');
const downloadTrigger = document.getElementById('downloadTrigger');
const toastAlert = document.getElementById('toastAlert');
const imgLoader = document.getElementById('imgLoader');
const partitionLoader = document.getElementById('partitionLoader');
const downloadExtension = document.getElementById('downloadExtension');
const templatesContainer = document.getElementById('templatesContainer');
const textLayersBox = document.getElementById('textLayersBox');
const stickerLayersBox = document.getElementById('stickerLayersBox');
const emojisBox = document.getElementById('emojisBox');
const brushColorPicker = document.getElementById('brushColorPicker');
const brushThickness = document.getElementById('brushThickness');
const thicknessValue = document.getElementById('thicknessValue');

const STRUCTS = [
  {id:'single', name:'صورة واحدة', blocks:[{x:0,y:0,w:1,h:1}]},
  {id:'side2', name:'قسمين طوليين', blocks:[{x:0,y:0,w:.5,h:1},{x:.5,y:0,w:.5,h:1}]},
  {id:'stack2', name:'قسمين عرضيين', blocks:[{x:0,y:0,w:1,h:.5},{x:0,y:.5,w:1,h:.5}]},
  {id:'grid4', name:'4 أقسام', blocks:[{x:0,y:0,w:.5,h:.5},{x:.5,y:0,w:.5,h:.5},{x:0,y:.5,w:.5,h:.5},{x:.5,y:.5,w:.5,h:.5}]},
];

const STICKER_LIST = ['😀','😂','😍','😎','🤔','😭','🔥','💯','👍','❤️','💀','💥','🚀','🎯','✨'];
const FONTS_COLLECTION = [
  {value:"'Impact',sans-serif", label:'إمباكت'},
  {value:"'Arial Black',sans-serif", label:'أريال بولد'},
  {value:"sans-serif", label:'عادي'}
];

let globalId = 1;
const coreState = {
  w: 800, h: 800,
  activeLayout: 'single',
  partitions: [],
  drawOverlay: document.createElement('canvas'),
  elements: [],
  focusedElementId: null,
  brushMode: 'off'
};

coreState.drawOverlay.width = coreState.w;
coreState.drawOverlay.height = coreState.h;
const oCtx = coreState.drawOverlay.getContext('2d');

function pushToast(text){
  toastAlert.textContent = text;
  toastAlert.classList.add('visible');
  clearTimeout(pushToast._timer);
  pushToast._timer = setTimeout(()=> toastAlert.classList.remove('visible'), 2000);
}

function syncLayoutSelection(){
  templatesContainer.innerHTML = '';
  STRUCTS.forEach(str=>{
    const wrapper = document.createElement('div');
    wrapper.className = 'item-template' + (str.id === coreState.activeLayout ? ' active' : '');
    const preview = document.createElement('div');
    preview.className = 'preview-blocks';
    str.blocks.forEach(b=>{
      const d = document.createElement('div');
      d.style.position = 'absolute';
      d.style.left = (b.x*100)+'%'; d.style.top = (b.y*100)+'%';
      d.style.width = (b.w*100)+'%'; d.style.height = (b.h*100)+'%';
      preview.appendChild(d);
    });
    const label = document.createElement('span');
    label.textContent = str.name;
    wrapper.appendChild(preview); wrapper.appendChild(label);
    wrapper.addEventListener('click', ()=> applyStructuralLayout(str.id));
    templatesContainer.appendChild(wrapper);
  });
}

function applyStructuralLayout(id){
  const found = STRUCTS.find(x=>x.id===id);
  if(!found) return;
  const historicImgs = coreState.partitions.map(p=>p.img);
  coreState.activeLayout = id;
  coreState.partitions = found.blocks.map((b,i)=>({...b, img: historicImgs[i] || null}));
  
  syncLayoutSelection();
  repaint();
  evaluateHintVisibility();
}

function evaluateHintVisibility(){
  const hasImage = coreState.partitions.some(p=>p.img);
  stageHint.classList.toggle('hidden', hasImage);
  downloadTrigger.disabled = !hasImage;
  if(hasImage) {
    dimensionsLabel.textContent = `الدقة الحالية: ${coreState.w} × ${coreState.h} بكسل`;
  } else {
    dimensionsLabel.textContent = 'Ready';
  }
}

function getPartitionDimensionsPx(partition){
  return {
    x: partition.x * coreState.w,
    y: partition.y * coreState.h,
    w: partition.w * coreState.w,
    h: partition.h * coreState.h
  };
}

let targetedPartitionIndex = null;
partitionLoader.addEventListener('change', e=>{
  const file = e.target.files[0];
  if(file && targetedPartitionIndex !== null){
    injectImageToPartition(file, targetedPartitionIndex);
  }
  partitionLoader.value = '';
  targetedPartitionIndex = null;
});

function injectImageToPartition(file, index){
  if(!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      coreState.partitions[index].img = img;
      repaint();
      evaluateHintVisibility();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

imgLoader.addEventListener('change', e=>{
  if(e.target.files[0]){
    if(coreState.partitions.length === 0) applyStructuralLayout('single');
    injectImageToPartition(e.target.files[0], 0);
  }
  imgLoader.value = '';
});

function createNewTextLayer(customText){
  const item = {
    id: globalId++, type: 'text',
    text: customText || 'اكتب تعليقك هنا',
    x: coreState.w / 2, y: coreState.h * 0.2,
    fontSize: 50, fontFamily: FONTS_COLLECTION[0].value,
    fill: '#ffffff', stroke: '#000000', strokeWidth: 5,
    angle: 0, forceUpper: false
  };
  coreState.elements.push(item);
  coreState.focusedElementId = item.id;
  syncLayersPanel();
  repaint();
}
window.createNewTextLayer = createNewTextLayer;

function createNewStickerLayer(emoji){
  const item = {
    id: globalId++, type: 'sticker', text: emoji,
    x: coreState.w / 2, y: coreState.h / 2,
    fontSize: 75, angle: 0
  };
  coreState.elements.push(item);
  coreState.focusedElementId = item.id;
  syncLayersPanel();
  repaint();
}

function purgeLayer(id){
  coreState.elements = coreState.elements.filter(el => el.id !== id);
  if(coreState.focusedElementId === id) coreState.focusedElementId = null;
  syncLayersPanel();
  repaint();
}

function syncLayersPanel(){
  textLayersBox.innerHTML = '';
  stickerLayersBox.innerHTML = '';

  coreState.elements.forEach(el => {
    const card = document.createElement('div');
    card.className = 'card-layer-item' + (el.id === coreState.focusedElementId ? ' active' : '');
    
    if(el.type === 'text') {
      card.innerHTML = `
        <div class="card-layer-top"><span class="title">طبقة نص #${el.id}</span><button class="btn-delete-layer">حذف</button></div>
        <textarea>${el.text}</textarea>
        <div class="layout-split">
          <div class="ctrl-group"><label>الحجم</label><div class="slider-container"><input type="range" class="valSize" min="15" max="120" value="${el.fontSize}"></div></div>
          <div class="ctrl-group"><label>الدوران</label><div class="slider-container"><input type="range" class="valAngle" min="-180" max="180" value="${el.angle}"></div></div>
        </div>
        <div class="layout-split">
          <div class="ctrl-group"><label>لون التعبئة</label><div class="color-picker-box"><input type="color" class="valFill" value="${el.fill}"></div></div>
          <div class="ctrl-group"><label>لون الحدود</label><div class="color-picker-box"><input type="color" class="valStroke" id="strokeColorInput_${el.id}" value="${el.stroke}"></div></div>
        </div>
        <input type="hidden" id="strokeWidthInput_${el.id}" value="${el.strokeWidth}">
      `;

      // المرحلة العاشرة: استخدام محرك تحويل أرقام صريح وآمن لمنع تداخل القوانين المتغيرة
      const strokeR = { value: el.strokeWidth }; 
      el.strokeWidth = Number(strokeR.value);

      card.querySelector('textarea').addEventListener('input', e=> { el.text = e.target.value; repaint(); });
      card.querySelector('.valSize').addEventListener('input', e=> { el.fontSize = +e.target.value; repaint(); });
      card.querySelector('.valAngle').addEventListener('input', e=> { el.angle = +e.target.value; repaint(); });
      card.querySelector('.valFill').addEventListener('input', e=> { el.fill = e.target.value; repaint(); });
      card.querySelector('.valStroke').addEventListener('input', e=> { el.stroke = e.target.value; repaint(); });
      card.querySelector('.btn-delete-layer').addEventListener('click', () => purgeLayer(el.id));
      textLayersBox.appendChild(card);
    } else {
      card.innerHTML = `
        <div class="card-layer-top"><span class="title">ملصق تعبيري (${el.text})</span><button class="btn-delete-layer">حذف</button></div>
        <div class="layout-split">
          <div class="ctrl-group"><label>الحجم</label><div class="slider-container"><input type="range" class="valSize" min="30" max="250" value="${el.fontSize}"></div></div>
          <div class="ctrl-group"><label>الدوران</label><div class="slider-container"><input type="range" class="valAngle" min="-180" max="180" value="${el.angle}"></div></div>
        </div>
      `;
      card.querySelector('.valSize').addEventListener('input', e=> { el.fontSize = +e.target.value; repaint(); });
      card.querySelector('.valAngle').addEventListener('input', e=> { el.angle = +e.target.value; repaint(); });
      card.querySelector('.btn-delete-layer').addEventListener('click', () => purgeLayer(el.id));
      stickerLayersBox.appendChild(card);
    }
  });
}

function initializeEmojiTray(){
  emojisBox.innerHTML = '';
  STICKER_LIST.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'btn-emoji'; btn.textContent = s;
    btn.addEventListener('click', () => createNewStickerLayer(s));
    emojisBox.appendChild(btn);
  });
}

function changeBrushMode(mode){
  coreState.brushMode = mode;
  document.getElementById('penTool').className = 'btn-action' + (mode === 'pen' ? ' primary' : '');
  document.getElementById('eraserTool').className = 'btn-action' + (mode === 'eraser' ? ' primary' : '');
  document.getElementById('disableDrawTool').className = 'btn-action' + (mode === 'off' ? ' primary' : '');
  canvas.style.cursor = mode === 'off' ? 'grab' : 'crosshair';
}
window.changeBrushMode = changeBrushMode;
changeBrushMode('off');

brushThickness.addEventListener('input', () => { thicknessValue.textContent = brushThickness.value; });

function resetDrawLayer(){
  oCtx.clearRect(0,0,coreState.w, coreState.h);
  repaint();
  pushToast('تم مسح لوحة الرسم بنجاح.');
}
window.resetDrawLayer = resetDrawLayer;

function repaint(){
  ctx.clearRect(0,0,coreState.w,coreState.h);

  coreState.partitions.forEach(p => {
    const box = getPartitionDimensionsPx(p);
    if(p.img) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(box.x, box.y, box.w, box.h);
      ctx.clip();

      const scale = Math.max(box.w / p.img.width, box.h / p.img.height);
      const offsetX = (box.w - p.img.width * scale) / 2;
      const offsetY = (box.h - p.img.height * scale) / 2;
      ctx.drawImage(p.img, box.x + offsetX, box.y + offsetY, p.img.width * scale, p.img.height * scale);
      ctx.restore();
    } else {
      ctx.fillStyle = '#1e293b';
      ctx.fillRect(box.x, box.y, box.w, box.h);
      ctx.strokeStyle = '#2e3d52';
      ctx.lineWidth = 2;
      ctx.strokeRect(box.x, box.y, box.w, box.h);
    }
  });

  ctx.drawImage(coreState.drawOverlay, 0, 0);

  coreState.elements.forEach(el => {
    ctx.save();
    ctx.translate(el.x, el.y);
    ctx.rotate((el.angle * Math.PI) / 180);

    if(el.type === 'text') {
      const renderableText = el.text;
      ctx.font = `bold ${el.fontSize}px ${el.fontFamily}`;
      ctx.fillStyle = el.fill;
      ctx.strokeStyle = el.stroke;
      ctx.lineWidth = el.strokeWidth;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const paragraphs = renderableText.split('\n');
      const step = el.fontSize * 1.25;
      paragraphs.forEach((line, index) => {
        const offset = index * step - ((paragraphs.length - 1) * step) / 2;
        if(el.strokeWidth > 0) ctx.strokeText(line, 0, offset);
        ctx.fillText(line, 0, offset);
      });
    } else {
      ctx.font = `${el.fontSize}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(el.text, 0, 0);
    }

    if(el.id === coreState.focusedElementId) {
      // المرحلة الحادية عشرة: استدعاء المتغير البرمجي من جذر الأنماط الخارجي مباشرة
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 3]);
      ctx.strokeRect(-75, -35, 150, 70);
    }
    ctx.restore();
  });
}

let activeTrack = false;
let pointerOriginX, pointerOriginY;

canvas.addEventListener('mousedown', initiatePointerDown);
canvas.addEventListener('mousemove', initiatePointerMove);
canvas.addEventListener('mouseup', terminatePointerTracking);
canvas.addEventListener('touchstart', e => { if(e.touches.length===1) { e.preventDefault(); initiatePointerDown(e.touches[0]); } }, {passive:false});
canvas.addEventListener('touchmove', e => { if(e.touches.length===1) { e.preventDefault(); initiatePointerMove(e.touches[0]); } }, {passive:false});
canvas.addEventListener('touchend', terminatePointerTracking);

function fetchClientCoordinates(e){
  const bound = canvas.getBoundingClientRect();
  return {
    x: ((e.clientX - bound.left) / bound.width) * coreState.w,
    y: ((e.clientY - bound.top) / bound.height) * coreState.h
  };
}

function locatePartitionIndexByClient(clientX, clientY) {
  const bound = canvas.getBoundingClientRect();
  const px = (clientX - bound.left) / bound.width;
  const py = (clientY - bound.top) / bound.height;
  return coreState.partitions.findIndex(p => px >= p.x && px <= (p.x + p.w) && py >= p.y && py <= (p.y + p.h));
}

function initiatePointerDown(e){
  const coords = fetchClientCoordinates(e);
  pointerOriginX = coords.x;
  pointerOriginY = coords.y;

  if(coreState.brushMode !== 'off') {
    activeTrack = true;
    oCtx.beginPath();
    oCtx.moveTo(pointerOriginX, pointerOriginY);
    return;
  }

  let captured = null;
  for(let i = coreState.elements.length - 1; i >= 0; i--) {
    const el = coreState.elements[i];
    if(Math.hypot(coords.x - el.x, coords.y - el.y) < (el.fontSize ? el.fontSize * 0.8 : 45)) {
      captured = el;
      break;
    }
  }

  if(captured) {
    coreState.focusedElementId = captured.id;
    activeTrack = true;
    syncLayersPanel();
    repaint();
  } else {
    const pIdx = locatePartitionIndexByClient(e.clientX, e.clientY);
    if(pIdx >= 0) {
      targetedPartitionIndex = pIdx;
      partitionLoader.click();
    }
    coreState.focusedElementId = null;
    syncLayersPanel();
    repaint();
  }
}

function initiatePointerMove(e){
  if(!activeTrack) return;
  const coords = fetchClientCoordinates(e);

  if(coreState.brushMode !== 'off') {
    oCtx.lineWidth = brushThickness.value;
    oCtx.lineCap = 'round';
    oCtx.lineJoin = 'round';
    if(coreState.brushMode === 'pen') {
      oCtx.globalCompositeOperation = 'source-over';
      oCtx.strokeStyle = brushColorPicker.value;
    } else {
      oCtx.globalCompositeOperation = 'destination-out';
    }
    oCtx.lineTo(coords.x, coords.y);
    oCtx.stroke();
    repaint();
    return;
  }

  if(coreState.focusedElementId) {
    const matched = coreState.elements.find(x => x.id === coreState.focusedElementId);
    if(matched) {
      matched.x += (coords.x - pointerOriginX);
      matched.y += (coords.y - pointerOriginY);
      pointerOriginX = coords.x;
      pointerOriginY = coords.y;
      repaint();
    }
  }
}

function terminatePointerTracking(){
  activeTrack = false;
}

function triggerMemeDownload(){
  if(!coreState.partitions.some(p => p.img)) return;
  const cacheFocus = coreState.focusedElementId;
  coreState.focusedElementId = null;
  repaint();

  const extension = downloadExtension.value;
  const suffix = extension === 'image/jpeg' ? '.jpg' : '.png';
  const url = canvas.toDataURL(extension, 0.95);

  const anchor = document.createElement('a');
  anchor.download = 'Meme_' + Date.now() + suffix;
  anchor.href = url;
  anchor.click();

  coreState.focusedElementId = cacheFocus;
  repaint();
  pushToast('تم تحميل الصورة بنجاح!');
}
window.triggerMemeDownload = triggerMemeDownload;

applyStructuralLayout('single');
initializeEmojiTray();
syncLayersPanel();

})();
</script>
</body>
</html>
