<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tone.pics | Image Merger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin:0; background:#0d0f13; color:#eee; font-family:'Segoe UI', sans-serif;
    display:flex; height:100vh; overflow:hidden;
  }
  #toolbar {
    width:310px; background:#171a21; padding:16px; display:flex; flex-direction:column;
    gap:12px; border-right:1px solid #2a2e37; overflow-y:auto;
  }
  #toolbar h3 { margin:0 0 4px; color:#ffd23f; }
  .section { background:#1e222b; padding:10px; border-radius:8px; display:flex; flex-direction:column; gap:8px; }
  .section label { font-size:12px; color:#9aa0ac; }
  .row { display:flex; gap:8px; align-items:center; }
  .row > * { flex:1; }
  input[type=file], select, input[type=range], input[type=number], input[type=color] {
    background:#0d0f13; color:#fff; border:1px solid #333; border-radius:4px; padding:6px; width:100%;
  }
  input[type=checkbox] { width:auto; }
  .btn {
    background:#ffd23f; color:#111; border:none; padding:10px; cursor:pointer;
    font-weight:bold; border-radius:6px; transition:.15s;
  }
  .btn:hover { filter:brightness(1.1); }
  .btn.secondary { background:#2a2e37; color:#eee; }
  .btn.danger { background:#e5484d; color:#fff; }
  .btn.success { background:#28a745; color:#fff; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  #homeBtn {
    display:flex; align-items:center; gap:6px; background:#2a2e37; color:#eee;
    border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-size:13px;
    width:100%; justify-content:center;
  }
  #homeBtn:hover { background:#343946; }
  #canvas-area {
    flex:1; display:flex; align-items:center; justify-content:center; padding:20px; overflow:auto;
  }
  #canvas-wrap { border:1px solid #2a2e37; background:
    repeating-conic-gradient(#20232b 0% 25%, #14161b 0% 50%) 50% / 20px 20px; box-shadow:0 0 40px rgba(0,0,0,.5); }
  #imgList { display:flex; flex-direction:column; gap:6px; max-height:220px; overflow-y:auto; }
  .img-item {
    display:flex; align-items:center; gap:8px; background:#0d0f13; border:1px solid #2a2e37;
    border-radius:6px; padding:6px; cursor:grab;
  }
  .img-item.active { border-color:#ffd23f; }
  .img-item img { width:36px; height:36px; object-fit:cover; border-radius:4px; }
  .img-item span { flex:1; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .img-item .rm { color:#e5484d; cursor:pointer; font-size:14px; padding:0 4px; }
  #msg { font-size:13px; color:#9aa0ac; min-height:18px; }
  #result { display:none; flex-direction:column; align-items:center; gap:6px; }
  #result img { max-width:280px; border:1px solid #333; border-radius:6px; }
  .mode-only { display:none; }
</style>
</head>
<body>

<div id="toolbar">
  <button id="homeBtn" onclick="goHome()">🏠 Back to Home</button>
  <h3>🧩 Image Merger</h3>

  <div class="section">
    <label>Add images</label>
    <input type="file" id="upload" multiple accept="image/*">
    <label>Images (drag to reorder)</label>
    <div id="imgList"></div>
  </div>

  <div class="section">
    <label>Merge mode</label>
    <select id="mode" onchange="onModeChange()">
      <option value="grid">Grid (rows &amp; columns)</option>
      <option value="horizontal">Horizontal strip</option>
      <option value="vertical">Vertical strip</option>
      <option value="overlay">Free overlay (drag / resize / blend)</option>
    </select>
  </div>

  <div class="section mode-only" data-mode="grid,horizontal,vertical">
    <div class="row">
      <div>
        <label>Cell width (px)</label>
        <input type="number" id="cellW" value="220" min="40" onchange="applyLayout()">
      </div>
      <div>
        <label>Cell height (px)</label>
        <input type="number" id="cellH" value="220" min="40" onchange="applyLayout()">
      </div>
    </div>
    <div class="row mode-only" data-mode="grid">
      <div>
        <label>Columns</label>
        <input type="number" id="cols" value="3" min="1" onchange="applyLayout()">
      </div>
    </div>
    <label>Gap (px)</label>
    <input type="range" id="gap" min="0" max="60" value="10" oninput="applyLayout()">
    <button class="btn secondary" onclick="applyLayout()">↻ Re-apply Layout</button>
  </div>

  <div class="section mode-only" data-mode="overlay">
    <div class="row">
      <div>
        <label>Canvas width</label>
        <input type="number" id="ovW" value="800" min="100" onchange="setOverlayCanvasSize()">
      </div>
      <div>
        <label>Canvas height</label>
        <input type="number" id="ovH" value="600" min="100" onchange="setOverlayCanvasSize()">
      </div>
    </div>
    <label>Selected layer opacity</label>
    <input type="range" id="layerOpacity" min="0" max="1" step="0.05" value="1" oninput="applyLayerOpacity(this.value)">
    <label>Selected layer blend mode</label>
    <select id="blendMode" onchange="applyBlendMode(this.value)">
      <option value="source-over">Normal</option>
      <option value="multiply">Multiply</option>
      <option value="screen">Screen</option>
      <option value="overlay">Overlay</option>
      <option value="darken">Darken</option>
      <option value="lighten">Lighten</option>
      <option value="difference">Difference</option>
      <option value="color-dodge">Color Dodge</option>
    </select>
    <div class="row">
      <button class="btn secondary" onclick="bringForward()">⬆ Forward</button>
      <button class="btn secondary" onclick="sendBackward()">⬇ Backward</button>
    </div>
  </div>

  <div class="section">
    <label>Background</label>
    <div class="row">
      <input type="color" id="bgColor" value="#000000" onchange="applyBackground()">
      <label style="flex:0 0 auto; display:flex; align-items:center; gap:4px;">
        <input type="checkbox" id="transparentBg" onchange="applyBackground()"> Transparent
      </label>
    </div>
  </div>

  <div class="section">
    <label>Export</label>
    <div class="row">
      <select id="format">
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
      </select>
      <select id="scale">
        <option value="1">1x</option>
        <option value="2" selected>2x</option>
        <option value="3">3x</option>
      </select>
    </div>
    <button class="btn success" onclick="exportImage()">⬇ Merge &amp; Export</button>
    <div id="msg"></div>
    <div id="result">
      <img id="resultImg">
      <a class="btn" id="downloadLink" download="tone-pics-merged.png">Download Image</a>
    </div>
  </div>
</div>

<div id="canvas-area">
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
</div>

<script>
let canvas;
let images = []; // { id, src, obj, name }
let currentMode = 'grid';

function goHome() {
  if (images.length > 0) {
    const ok = confirm('You have unsaved merge work. Go back to Home and discard it?');
    if (!ok) return;
  }
  window.location.href = 'https://tone-pics.vercel.app/';
}

function uid() { return Math.random().toString(36).slice(2, 9); }

function initCanvas() {
  canvas = new fabric.Canvas('c');
  canvas.setWidth(800);
  canvas.setHeight(600);
  canvas.on('selection:created', syncControls);
  canvas.on('selection:updated', syncControls);
  applyBackground();
}
initCanvas();

function syncControls() {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  document.getElementById('layerOpacity').value = obj.opacity ?? 1;
  document.getElementById('blendMode').value = obj.globalCompositeOperation || 'source-over';
  document.querySelectorAll('.img-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.img-item[data-id="${obj._mergeId}"]`);
  if (item) item.classList.add('active');
}

function applyBackground() {
  const transparent = document.getElementById('transparentBg').checked;
  const color = document.getElementById('bgColor').value;
  canvas.set('backgroundColor', transparent ? '' : color);
  canvas.renderAll();
}

function onModeChange() {
  currentMode = document.getElementById('mode').value;
  document.querySelectorAll('.mode-only').forEach(el => {
    const modes = el.getAttribute('data-mode').split(',');
    el.style.display = modes.includes(currentMode) ? '' : 'none';
  });
  if (currentMode === 'overlay') {
    setOverlayCanvasSize();
    images.forEach(im => {
      im.obj.set({ selectable: true, hasControls: true, hoverCursor: 'move' });
    });
  } else {
    applyLayout();
  }
  canvas.renderAll();
}
onModeChange();

function setOverlayCanvasSize() {
  const w = parseInt(document.getElementById('ovW').value, 10) || 800;
  const h = parseInt(document.getElementById('ovH').value, 10) || 600;
  canvas.setWidth(w);
  canvas.setHeight(h);
  applyBackground();
  if (currentMode === 'overlay') {
    images.forEach(im => fitContain(im.obj, w, h, true));
  }
  canvas.renderAll();
}

function fitContain(obj, boxW, boxH, center) {
  const scale = Math.min(boxW / obj.width, boxH / obj.height, 1);
  obj.scale(scale);
  if (center) {
    obj.set({
      left: boxW / 2,
      top: boxH / 2,
      originX: 'center',
      originY: 'center'
    });
  }
}

// ---- Upload ----
document.getElementById('upload').onchange = (e) => {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => addImage(ev.target.result, file.name);
    reader.readAsDataURL(file);
  });
  e.target.value = '';
};

function addImage(dataUrl, name) {
  fabric.Image.fromURL(dataUrl, (img) => {
    img._mergeId = uid();
    img.set({ originX: 'center', originY: 'center' });
    canvas.add(img);
    images.push({ id: img._mergeId, src: dataUrl, obj: img, name: name || 'image' });
    renderList();
    if (currentMode === 'overlay') {
      setOverlayCanvasSize();
    } else {
      applyLayout();
    }
  }, { crossOrigin: 'anonymous' });
}

function renderList() {
  const list = document.getElementById('imgList');
  list.innerHTML = '';
  images.forEach((im, i) => {
    const div = document.createElement('div');
    div.className = 'img-item';
    div.setAttribute('data-id', im.id);
    div.draggable = true;
    div.innerHTML = `<img src="${im.src}"><span>${im.name}</span><span class="rm">✕</span>`;
    div.onclick = (e) => {
      if (e.target.classList.contains('rm')) return;
      canvas.setActiveObject(im.obj);
      canvas.renderAll();
      syncControls();
    };
    div.querySelector('.rm').onclick = (e) => {
      e.stopPropagation();
      removeImage(i);
    };
    div.ondragstart = () => div._dragIdx = i;
    div.ondragover = (e) => e.preventDefault();
    div.ondrop = (e) => {
      e.preventDefault();
      const from = div._dragIdx;
      const to = i;
      if (from === undefined || from === to) return;
      const moved = images.splice(from, 1)[0];
      images.splice(to, 0, moved);
      renderList();
      if (currentMode !== 'overlay') applyLayout();
    };
    list.appendChild(div);
  });
}

function removeImage(i) {
  const im = images[i];
  canvas.remove(im.obj);
  images.splice(i, 1);
  renderList();
  if (currentMode !== 'overlay') applyLayout();
  canvas.renderAll();
}

// ---- Grid / strip layout ----
function applyLayout() {
  if (currentMode === 'overlay' || images.length === 0) return;

  const cellW = parseInt(document.getElementById('cellW').value, 10) || 200;
  const cellH = parseInt(document.getElementById('cellH').value, 10) || 200;
  const gap = parseInt(document.getElementById('gap').value, 10) || 0;
  const n = images.length;

  let cols, rows, canvasW, canvasH;

  if (currentMode === 'grid') {
    cols = Math.max(1, parseInt(document.getElementById('cols').value, 10) || 1);
    rows = Math.ceil(n / cols);
    canvasW = cols * cellW + gap * (cols + 1);
    canvasH = rows * cellH + gap * (rows + 1);
  } else if (currentMode === 'horizontal') {
    cols = n; rows = 1;
    canvasW = n * cellW + gap * (n + 1);
    canvasH = cellH + gap * 2;
  } else { // vertical
    cols = 1; rows = n;
    canvasW = cellW + gap * 2;
    canvasH = n * cellH + gap * (n + 1);
  }

  canvas.setWidth(canvasW);
  canvas.setHeight(canvasH);

  images.forEach((im, i) => {
    const r = Math.floor(i / cols);
    const c = i % cols;
    const boxLeft = gap + c * (cellW + gap);
    const boxTop = gap + r * (cellH + gap);
    im.obj.set({
      selectable: false,
      hasControls: false,
      hoverCursor: 'default',
      angle: 0
    });
    im.obj.scale(1);
    fitContain(im.obj, cellW, cellH, false);
    im.obj.set({
      originX: 'center',
      originY: 'center',
      left: boxLeft + cellW / 2,
      top: boxTop + cellH / 2
    });
  });

  applyBackground();
  canvas.renderAll();
}

// ---- Overlay controls ----
function applyLayerOpacity(v) {
  const obj = canvas.getActiveObject();
  if (obj) { obj.set('opacity', parseFloat(v)); canvas.renderAll(); }
}
function applyBlendMode(v) {
  const obj = canvas.getActiveObject();
  if (obj) { obj.set('globalCompositeOperation', v); canvas.renderAll(); }
}
function bringForward() {
  const obj = canvas.getActiveObject();
  if (obj) { canvas.bringForward(obj); canvas.renderAll(); }
}
function sendBackward() {
  const obj = canvas.getActiveObject();
  if (obj) { canvas.sendBackwards(obj); canvas.renderAll(); }
}

// ---- Export ----
function exportImage() {
  if (images.length === 0) { alert('Add images first'); return; }
  canvas.discardActiveObject();
  canvas.renderAll();

  const format = document.getElementById('format').value;
  const scale = parseFloat(document.getElementById('scale').value);
  const transparent = document.getElementById('transparentBg').checked;

  if (format === 'jpeg' && transparent) {
    document.getElementById('msg').innerText = 'JPEG does not support transparency, using white background for export.';
    canvas.set('backgroundColor', '#ffffff');
    canvas.renderAll();
  }

  const dataUrl = canvas.toDataURL({
    format: format,
    quality: 0.92,
    multiplier: scale
  });

  if (format === 'jpeg' && transparent) {
    applyBackground(); // restore transparent bg in editor after export
  }

  document.getElementById('resultImg').src = dataUrl;
  const link = document.getElementById('downloadLink');
  link.href = dataUrl;
  link.download = 'tone-pics-merged.' + (format === 'jpeg' ? 'jpg' : 'png');
  document.getElementById('result').style.display = 'flex';
  document.getElementById('msg').innerText = 'Merged successfully ✅';
}
</script>
</body>
</html>
