<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Palette Generator - Tone.pics</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
    text-align:center;
}

h1{
    font-size:42px;
}

.upload{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    margin:30px 0;
}

input{
    margin:20px;
}

img{
    max-width:350px;
    border-radius:15px;
}

.palette{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
    margin-top:30px;
}

.color{
    padding:30px 10px;
    border-radius:15px;
    font-weight:bold;
}

button{
    margin-top:10px;
    padding:10px 15px;
    border:0;
    border-radius:10px;
    cursor:pointer;
}

</style>

</head>


<body>


<div class="container">

<h1>🎨 Color Palette Generator</h1>

<p>Extract beautiful colors from your images.</p>


<div class="upload">

<input type="file" id="imageInput" accept="image/*">

<br>

<img id="preview">


</div>


<div class="palette" id="palette"></div>


</div>


<script>

const input=document.getElementById("imageInput");
const preview=document.getElementById("preview");
const palette=document.getElementById("palette");


input.addEventListener("change",function(){

const file=this.files[0];

if(!file) return;


const imgURL=URL.createObjectURL(file);

preview.src=imgURL;


preview.onload=()=>{

const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");


canvas.width=100;
canvas.height=100;


ctx.drawImage(preview,0,0,100,100);


const data=ctx.getImageData(0,0,100,100).data;


let colors={};


for(let i=0;i<data.length;i+=4){

let r=data[i];
let g=data[i+1];
let b=data[i+2];


let key=`${Math.round(r/20)*20},${Math.round(g/20)*20},${Math.round(b/20)*20}`;


colors[key]=(colors[key]||0)+1;

}


let result=Object.entries(colors)
.sort((a,b)=>b[1]-a[1])
.slice(0,5);


palette.innerHTML="";


result.forEach(item=>{

let rgb=item[0].split(",");

let hex="#"+rgb.map(x=>{

let h=Number(x).toString(16);

return h.length==1?"0"+h:h;

}).join("");


let card=document.createElement("div");

card.className="color";

card.style.background=hex;


card.innerHTML=`

<div>${hex}</div>

<button onclick="copyColor('${hex}')">
Copy
</button>

`;


palette.appendChild(card);


});


}


});


});


function copyColor(color){

navigator.clipboard.writeText(color);

alert("Copied "+color);

}


</script>


</body>
</html>
