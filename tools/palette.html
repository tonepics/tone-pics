<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Palette Generator - Tone.pics</title>

<link rel="stylesheet" href="tool-style.css">

</head>


<body>


<div class="tool-container">


<a class="back-home" href="../index.html">
← Back Home
</a>


<div class="tool-header">

<h1>🎨 Color Palette Generator</h1>

<p>
Extract beautiful colors from your images.
</p>

</div>



<div class="tool-box">


<input 
type="file" 
id="imageInput" 
accept="image/*"
>


<img 
id="preview" 
class="preview-image"
>


</div>



<div class="palette" id="palette"></div>



</div>



<footer>

© 2026 Tone.pics

</footer>



<script>


const input = document.getElementById("imageInput");

const preview = document.getElementById("preview");

const palette = document.getElementById("palette");



input.addEventListener("change", function(){


const file = this.files[0];


if(!file){

return;

}



const imgURL = URL.createObjectURL(file);


preview.src = imgURL;



preview.onload = function(){


const canvas = document.createElement("canvas");

const ctx = canvas.getContext("2d");



canvas.width = 100;

canvas.height = 100;



ctx.drawImage(
preview,
0,
0,
100,
100
);



const data = ctx.getImageData(
0,
0,
100,
100
).data;



let colors = {};



for(let i = 0; i < data.length; i += 4){


let r = data[i];

let g = data[i+1];

let b = data[i+2];



let key =
`${Math.round(r/20)*20},${Math.round(g/20)*20},${Math.round(b/20)*20}`;



colors[key] = (colors[key] || 0) + 1;


}




let result = Object.entries(colors)

.sort((a,b)=>b[1]-a[1])

.slice(0,5);



palette.innerHTML = "";



result.forEach(item=>{


let rgb = item[0].split(",");



let hex =
"#" +
rgb.map(x=>{


let value = Number(x).toString(16);


return value.length === 1 
? "0"+value 
: value;


}).join("");




let card = document.createElement("div");


card.className = "color-card";


card.style.background = hex;



card.innerHTML = `

<div>${hex.toUpperCase()}</div>

<button class="button" onclick="copyColor('${hex}')">

Copy

</button>

`;



palette.appendChild(card);



});



};



});




function copyColor(color){


navigator.clipboard.writeText(color);


alert(
"Copied " + color.toUpperCase()
);



}



</script>


</body>

</html>
