<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Resizer - Tone.pics</title>

<link rel="stylesheet" href="tool-style.css">

</head>


<body>


<div class="tool-container">


<a class="back-home" href="../index.html">
← Back Home
</a>



<div class="tool-header">

<h1>📏 Image Resizer</h1>

<p>
Resize your images quickly in your browser.
</p>

</div>



<div class="tool-box">


<input 
type="file" 
id="imageInput"
accept="image/*"
>



<img 
id="preview"
class="preview-image"
>



<div id="dimensions"></div>



<div>


<label>
Width:
</label>

<input 
type="number" 
id="width"
>


<br><br>


<label>
Height:
</label>

<input 
type="number" 
id="height"
>


<br><br>


<label>

<input 
type="checkbox" 
id="ratio"
checked
>

Keep aspect ratio

</label>


</div>



<br>


<button 
class="button"
id="resizeBtn"
>
Resize Image
</button>


<br><br>


<button 
class="button"
id="downloadBtn"
style="display:none;"
>
Download
</button>



</div>



</div>



<footer>

© 2026 Tone.pics

</footer>




<script>


const input =
document.getElementById("imageInput");


const preview =
document.getElementById("preview");


const widthInput =
document.getElementById("width");


const heightInput =
document.getElementById("height");


const ratio =
document.getElementById("ratio");


const resizeBtn =
document.getElementById("resizeBtn");


const downloadBtn =
document.getElementById("downloadBtn");


const dimensions =
document.getElementById("dimensions");



let image = new Image();

let originalRatio = 1;

let resizedURL = "";



input.addEventListener("change",function(){


const file=this.files[0];


if(!file)return;



image.onload=function(){


preview.src=image.src;


widthInput.value=image.width;

heightInput.value=image.height;


originalRatio =
image.width / image.height;



dimensions.innerHTML =
`
<p>
Original:
${image.width} × ${image.height}
</p>
`;



};



image.src =
URL.createObjectURL(file);



});



widthInput.addEventListener("input",()=>{


if(ratio.checked){


heightInput.value =
Math.round(
widthInput.value / originalRatio
);


}


});



heightInput.addEventListener("input",()=>{


if(ratio.checked){


widthInput.value =
Math.round(
heightInput.value * originalRatio
);


}


});



resizeBtn.addEventListener("click",()=>{


if(!image.src)return;



const canvas =
document.createElement("canvas");


const ctx =
canvas.getContext("2d");



canvas.width =
Number(widthInput.value);


canvas.height =
Number(heightInput.value);



ctx.drawImage(
image,
0,
0,
canvas.width,
canvas.height
);



canvas.toBlob(blob=>{


resizedURL =
URL.createObjectURL(blob);


preview.src =
resizedURL;


downloadBtn.style.display =
"inline-block";


},"image/jpeg",0.95);



});



downloadBtn.addEventListener("click",()=>{


const link =
document.createElement("a");


link.href =
resizedURL;


link.download =
"resized-image.jpg";


link.click();



});



</script>



</body>

</html>
